    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4aa; --primary-dark: #00b894; --secondary: #ff6b6b;
            --accent: #ffd93d; --dark: #0a0e1a; --darker: #060812;
            --card: #111827; --card-light: #1a2236; --text: #e2e8f0;
            --text-muted: #94a3b8; --border: #1e293b;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --info: #3b82f6;

            --gradient-2: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            --gradient-3: linear-gradient(135deg, #ffd93d 0%, #f6ad55 100%);

            --shadow-glow: 0 0 30px rgba(0,212,170,0.3);

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--darker); color: var(--text); min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }

        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bg-animation::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%); top: -200px; right: -200px; animation: float 20s infinite ease-in-out; }
        .bg-animation::after { content: ''; position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,107,107,0.06) 0%, transparent 70%); bottom: -150px; left: -150px; animation: float 25s infinite ease-in-out reverse; }
        @keyframes float { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-30px) scale(1.1); } 66% { transform: translate(-20px,20px) scale(0.9); } }

        .header { background: linear-gradient(180deg, rgba(6,8,18,0.95) 0%, rgba(6,8,18,0.8) 100%); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); padding: 15px 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 42px; height: 42px; background: var(--gradient-1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: var(--shadow-glow); }
        .logo-text h1 { font-size: 18px; font-weight: 900; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
        .logo-text span { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        .btn-icon:hover { background: var(--card-light); border-color: var(--primary); color: var(--primary); }
        .api-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        .status-dot.offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .status-dot.syncing { background: var(--warning); box-shadow: 0 0 10px var(--warning); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        .nav-container::-webkit-scrollbar { display: none; }
        .nav-tabs { display: flex; gap: 5px; padding: 10px 15px; min-width: max-content; }
        .nav-tab { padding: 10px 18px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }

        .live-banner::before { content: 'LIVE'; position: absolute; top: 10px; right: 15px; background: var(--secondary); color: white; font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .live-match { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .live-team { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .live-team img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }

        .live-stat-value { font-size: 18px; font-weight: 700; color: var(--text); }

        .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .match-card::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: var(--gradient-1); opacity: 0; transition: opacity 0.3s; }
        .match-card:hover::before { opacity: 1; }
        .match-card:hover { border-color: rgba(0,212,170,0.3); transform: translateX(5px); }
        .match-card.upcoming::before { background: var(--gradient-3); }

        .match-card.live::before { background: var(--gradient-2); opacity: 1; }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .match-league { font-size: 11px; color: var(--primary); font-weight: 700; background: rgba(0,212,170,0.1); padding: 4px 10px; border-radius: 6px; }
        .match-time { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
        .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .match-team { display: flex; align-items: center; gap: 12px; flex: 1; }
        .match-team.away { flex-direction: row-reverse; text-align: right; }
        .match-team-flag { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); background: var(--card-light); }
        .match-team-info h3 { font-size: 15px; font-weight: 700; }
        .match-team-info span { font-size: 12px; color: var(--text-muted); }
        .match-vs { text-align: center; flex-shrink: 0; }
        .match-vs-score { font-size: 24px; font-weight: 900; color: var(--text); }

        .match-predictions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .prediction-box { background: var(--card-light); border-radius: 10px; padding: 10px; text-align: center; }
        .prediction-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
        .prediction-value { font-size: 16px; font-weight: 700; color: var(--primary); }

        .group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .group-header { background: var(--gradient-1); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; }
        .group-header h3 { font-size: 16px; font-weight: 900; color: var(--dark); }
        .group-header span { font-size: 12px; color: rgba(0,0,0,0.6); font-weight: 700; }
        .group-table { width: 100%; border-collapse: collapse; }
        .group-table th { font-size: 11px; color: var(--text-muted); padding: 10px 8px; text-align: center; font-weight: 500; border-bottom: 1px solid var(--border); }
        .group-table td { padding: 12px 8px; text-align: center; font-size: 13px; border-bottom: 1px solid var(--border); }
        .group-table tr:last-child td { border-bottom: none; }
        .group-table .team-cell { display: flex; align-items: center; gap: 10px; text-align: left; }
        .group-table .team-flag { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }

        .detail-box h4 i { color: var(--primary); }
        .prob-bar { display: flex; height: 35px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .prob-bar-segment { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; transition: all 0.3s; }
        .prob-home { background: var(--primary); }
        .prob-draw { background: var(--accent); color: var(--dark); }
        .prob-away { background: var(--secondary); }
        .prob-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }

        .score-predictions { display: flex; gap: 10px; flex-wrap: wrap; }
        .score-chip { background: var(--card-light); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .score-chip .prob { color: var(--primary); font-size: 11px; }
        .score-chip.best { border-color: var(--primary); background: rgba(0,212,170,0.1); }
        .score-chip.ht { border-color: var(--info); background: rgba(59,130,246,0.1); }

        .score-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .score-table th { font-size: 11px; color: var(--text-muted); padding: 8px; text-align: center; font-weight: 500; border-bottom: 1px solid var(--border); }
        .score-table td { padding: 10px 8px; text-align: center; font-size: 13px; border-bottom: 1px solid var(--border); }
        .score-table tr:last-child td { border-bottom: none; }
        .score-table .score-cell { font-weight: 900; color: var(--accent); }
        .score-table .prob-cell { color: var(--primary); font-weight: 700; }
        .score-table .odds-cell { color: var(--text-muted); font-size: 12px; }

        .xg-display { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }

        .xg-value { font-size: 28px; font-weight: 900; color: var(--primary); }

        .xg-vs { font-size: 20px; color: var(--text-muted); font-weight: 700; }

        .betting-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .betting-card { background: var(--card-light); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .betting-card.highlight { border-color: var(--primary); background: rgba(0,212,170,0.05); }
        .betting-card h4 { font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .betting-card h4 i { color: var(--primary); }
        .betting-odds { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .odds-value { font-size: 20px; font-weight: 900; color: var(--accent); }
        .odds-trend { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 700; }

        .motivation-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }

        .motivation-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-size: 12px; font-weight: 900; color: white; transition: width 1s ease; }
        .motivation-fill.high { background: var(--success); }

        .motivation-score { width: 50px; text-align: right; font-size: 18px; font-weight: 900; color: var(--primary); }

            .prediction-details { grid-template-columns: repeat(3, 1fr); }
            .detail-box.full-width { grid-column: span 3; }
            .betting-grid { grid-template-columns: repeat(3, 1fr); }
        }

        ::-webkit-scrollbar-track { background: var(--darker); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>

            <div class="header-actions">
                <div class="api-status">
                    <div class="status-dot" id="apiStatus"></div>
                    <span id="apiStatusText">數據同步中</span>
                </div>
                <button class="btn-icon" onclick="refreshData()" title="重新整理">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <nav class="nav-container">
        <div class="nav-tabs" id="topNav">
            <button class="nav-tab active" onclick="switchTab('today', this)"><i class="fas fa-calendar-day"></i> 今日賽事</button>
            <button class="nav-tab" onclick="switchTab('groups', this)"><i class="fas fa-table"></i> 小組積分</button>
            <button class="nav-tab" onclick="switchTab('predictions', this)"><i class="fas fa-brain"></i> AI預測</button>
            <button class="nav-tab" onclick="switchTab('live', this)"><i class="fas fa-bolt"></i> 滾球策略<span class="badge" id="liveBadge" style="display:none;">LIVE</span></button>
            <button class="nav-tab" onclick="switchTab('analysis', this)"><i class="fas fa-chart-line"></i> 深度分析</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="today" class="section active">
            <div class="data-sync-info" id="syncInfo">
                <i class="fas fa-database"></i>
                <span>數據來源: data.json | 最後更新: <span id="lastUpdated">--</span></span>
            </div>
            <div class="card">
                <div class="card-header">
                    <div>
                        <div class="card-title"><i class="fas fa-calendar-day"></i> <span id="todayDate">今日賽程</span></div>
                        <div class="card-subtitle" id="todaySubtitle">世界盃小組賽</div>
                    </div>
                    <span style="font-size:12px;color:var(--primary);font-weight:700;" id="todayRound">R3</span>
                </div>
            </div>
            <div id="liveBannerContainer"></div>
            <div id="todayMatches"></div>
        </section>

        <section id="groups" class="section">
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-table"></i> 小組賽積分榜</div>
                    <div class="card-subtitle">更新時間: <span id="standingsTime">--</span></div>
                </div>
            </div>
            <div class="group-grid" id="groupsContainer"></div>
        </section>

        <section id="predictions" class="section">
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-brain"></i> AI 智能預測模型</div>
                    <div class="card-subtitle">UNIFIED v3.3.42 多維度分析 + 波膽預測</div>
                </div>
            </div>
            <div class="prediction-panel" id="predictionPanel"></div>
            <div id="scoreAnalysisSection"></div>
            <div id="motivationSection"></div>
            <div id="weatherSection"></div>
        </section>

        <section id="live" class="section">
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-bolt" style="color:var(--secondary);"></i> 滾球實時策略監控</div>
                    <div class="card-subtitle">實時賠率與進球機會預警</div>
                </div>
            </div>
            <div id="upsetAlertContainer"></div>
            <div class="betting-grid" id="liveBettingGrid"></div>
            <div id="timeSegmentSection"></div>
        </section>

        <section id="analysis" class="section">
            <div id="analysisContent"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="bottom-nav-item active" onclick="switchTab('today', null, this)"><i class="fas fa-calendar-day"></i><span>賽程</span></button>
        <button class="bottom-nav-item" onclick="switchTab('groups', null, this)"><i class="fas fa-table"></i><span>積分</span></button>
        <button class="bottom-nav-item" onclick="switchTab('predictions', null, this)"><i class="fas fa-brain"></i><span>預測</span><span class="nav-badge" style="display:none;" id="bottomLiveBadge"></span></button>
        <button class="bottom-nav-item" onclick="switchTab('live', null, this)"><i class="fas fa-bolt"></i><span>滾球</span></button>
        <button class="bottom-nav-item" onclick="switchTab('analysis', null, this)"><i class="fas fa-chart-pie"></i><span>分析</span></button>
    </nav>

<script>
let appData = null;
let selectedMatchId = null;
const DATA_URL = 'data.json';

document.addEventListener('DOMContentLoaded', async function() {
    await loadData();
    setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 800);
    setInterval(loadData, 60000);
});

async function loadData() {
    const statusDot = document.getElementById('apiStatus');
    const statusText = document.getElementById('apiStatusText');
    statusDot.className = 'status-dot syncing';
    statusText.textContent = '數據同步中';
    try {
        const response = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed');
        appData = await response.json();
        renderAll();
        statusDot.className = 'status-dot';
        statusText.textContent = '已同步';
        document.getElementById('lastUpdated').textContent = new Date(appData.last_updated).toLocaleString('zh-HK', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch (e) {
        statusDot.className = 'status-dot offline';
        statusText.textContent = '離線模式';
        if (!appData) { appData = getFallbackData(); renderAll(); }
    }
}

function refreshData() {
    const icon = document.getElementById('refreshIcon');
    icon.classList.add('refreshing');
    loadData().then(() => setTimeout(() => icon.classList.remove('refreshing'), 500));
}

function renderAll() {
    if (!appData) return;
    renderTodayMatches();
    renderGroups();
    renderPredictions();
    renderLiveBetting();
    renderAnalysis();
    updateStandingsTime();
    checkLiveMatches();
}

function renderTodayMatches() {
    const container = document.getElementById('todayMatches');
    const bannerContainer = document.getElementById('liveBannerContainer');
    const matches = appData.matches?.today || [];
    if (matches.length === 0) {
        container.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-calendar-times" style="font-size:32px;margin-bottom:10px;"></i><div>今日暫無賽事</div></div>';
        return;
    }
    if (appData.meta) {
        document.getElementById('todayDate').textContent = appData.meta.date_display || '今日賽程';
        document.getElementById('todaySubtitle').textContent = appData.meta.round_info || '世界盃小組賽';
        document.getElementById('todayRound').textContent = appData.meta.round || 'R3';
    }
    const liveMatches = matches.filter(m => m.status === 'live');
    if (liveMatches.length > 0) {
        bannerContainer.innerHTML = liveMatches.map(m => renderLiveBanner(m)).join('');
        document.getElementById('liveBadge').style.display = 'inline';
        document.getElementById('bottomLiveBadge').style.display = 'block';
    } else {
        bannerContainer.innerHTML = '';
        document.getElementById('liveBadge').style.display = 'none';
        document.getElementById('bottomLiveBadge').style.display = 'none';
    }
    container.innerHTML = matches.map(match => {
        const statusClass = match.status || 'upcoming';
        const homeOdds = match.odds?.home || '-';
        const awayOdds = match.odds?.away || '-';
        return `
        <div class="match-card ${statusClass}" onclick="selectMatch(${match.id})">
            <div class="match-header">
                <span class="match-league">${match.group || ''}</span>
                <span class="match-time"><i class="far fa-clock"></i> ${match.time || 'TBC'} ${match.status === 'live' ? '<span style="color:var(--secondary);margin-left:5px;">● 進行中</span>' : ''}</span>
            </div>
            <div class="match-teams">
                <div class="match-team">
                    <img src="${match.home_flag || ''}" class="match-team-flag" alt="${match.home}">
                    <div class="match-team-info"><h3>${match.home}</h3><span>主勝 ${homeOdds}</span></div>
                </div>
                <div class="match-vs"><div class="match-vs-score">${match.score || 'VS'}</div><div class="match-vs-time">${match.time || ''}</div></div>
                <div class="match-team away">
                    <img src="${match.away_flag || ''}" class="match-team-flag" alt="${match.away}">
                    <div class="match-team-info"><h3>${match.away}</h3><span>客勝 ${awayOdds}</span></div>
                </div>
            </div>
            <div class="match-predictions">
                <div class="prediction-box"><div class="prediction-label">主勝機率</div><div class="prediction-value">${match.predictions?.home || '--'}</div><div class="prediction-odds">賠率 ${homeOdds}</div></div>
                <div class="prediction-box"><div class="prediction-label">和局機率</div><div class="prediction-value" style="color:var(--accent);">${match.predictions?.draw || '--'}</div><div class="prediction-odds">賠率 ${match.odds?.draw || '-'}</div></div>
                <div class="prediction-box"><div class="prediction-label">大小球</div><div class="prediction-value">${match.predictions?.ou || '--'}</div></div>
            </div>
        </div>`;
    }).join('');
}

function renderLiveBanner(match) {
    return `<div class="live-banner">
        <div class="live-match">
            <div class="live-team"><img src="${match.home_flag}" alt="${match.home}"><div class="live-team-name">${match.home}</div></div>
            <div class="live-score-box"><div class="live-score">${match.score || '0 - 0'}</div><div class="live-time">${match.live_time || "'"}</div></div>
            <div class="live-team"><img src="${match.away_flag}" alt="${match.away}"><div class="live-team-name">${match.away}</div></div>
        </div>
        <div class="live-stats">
            <div class="live-stat"><div class="live-stat-value">${match.live_stats?.corners || 0}</div><div class="live-stat-label">角球</div></div>
            <div class="live-stat"><div class="live-stat-value">${match.live_stats?.shots || 0}</div><div class="live-stat-label">射門</div></div>
            <div class="live-stat"><div class="live-stat-value">${match.live_stats?.possession || '50%'}</div><div class="live-stat-label">控球</div></div>
            <div class="live-stat"><div class="live-stat-value">${match.live_stats?.danger || 0}</div><div class="live-stat-label">危險攻勢</div></div>
        </div>
    </div>`;
}

function renderGroups() {
    const container = document.getElementById('groupsContainer');
    const groups = appData.groups || {};
    if (Object.keys(groups).length === 0) { container.innerHTML = '<div class="card" style="text-align:center;padding:40px;">暫無積分數據</div>'; return; }
    container.innerHTML = Object.entries(groups).map(([group, teams]) => {
        const sorted = teams.sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga));
        return `<div class="group-card">
            <div class="group-header"><h3>${group}組</h3><span>2026世界盃</span></div>
            <table class="group-table">
                <thead><tr><th style="text-align:left;padding-left:15px;">球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>得</th><th>失</th><th>積分</th></tr></thead>
                <tbody>${sorted.map((team, i) => `<tr class="${i < 2 ? 'qualified' : 'eliminated'}"><td style="padding-left:15px;"><div class="team-cell"><img src="${team.flag || ''}" class="team-flag" alt="${team.team}"><span class="team-name">${team.team}</span></div></td><td>${team.played || 0}</td><td>${team.won || 0}</td><td>${team.drawn || 0}</td><td>${team.lost || 0}</td><td>${team.gf || 0}</td><td>${team.ga || 0}</td><td class="points">${team.pts || 0}</td></tr>`).join('')}</tbody>
            </table>
        </div>`;
    }).join('');
}

function renderPredictions() {
    const panel = document.getElementById('predictionPanel');
    const scoreSection = document.getElementById('scoreAnalysisSection');
    const pred = appData.predictions?.selected || appData.predictions?.matches?.[0];
    if (!pred) { panel.innerHTML = '<div class="card" style="text-align:center;padding:40px;">請選擇賽事查看預測</div>'; return; }

    const homeProb = pred.probabilities?.home || 50;
    const drawProb = pred.probabilities?.draw || 25;
    const awayProb = pred.probabilities?.away || 25;

    panel.innerHTML = `
    <div class="prediction-teams">
        <div class="pred-team"><img src="${pred.home_flag}" alt="${pred.home}"><h2>${pred.home}</h2><span>${pred.home_fifa || ''}</span></div>
        <div class="pred-vs"><div class="pred-vs-text">勝率預測</div><div class="pred-probability">${homeProb}%</div><div class="pred-probability-label">主勝機率</div></div>
        <div class="pred-team"><img src="${pred.away_flag}" alt="${pred.away}"><h2>${pred.away}</h2><span>${pred.away_fifa || ''}</span></div>
    </div>
    <div class="prediction-details">
        <div class="detail-box full-width">
            <h4><i class="fas fa-percentage"></i> 1X2 勝平負機率</h4>
            <div class="prob-bar">
                <div class="prob-bar-segment prob-home" style="width: ${homeProb}%">主 ${homeProb}%</div>
                <div class="prob-bar-segment prob-draw" style="width: ${drawProb}%">和 ${drawProb}%</div>
                <div class="prob-bar-segment prob-away" style="width: ${awayProb}%">客 ${awayProb}%</div>
            </div>
            <div class="prob-labels"><span>主勝賠率: ${pred.odds?.home || '-'}</span><span>和賠率: ${pred.odds?.draw || '-'}</span><span>客勝賠率: ${pred.odds?.away || '-'}</span></div>
        </div>
        ${renderDetailBox('讓球盤', pred.handicap?.line, pred.handicap?.prob, pred.handicap?.expected, 'fa-exchange-alt')}
        ${renderDetailBox('大小球', pred.ou?.line, pred.ou?.prob, pred.ou?.expected, 'fa-futbol')}
        ${renderDetailBox('雙方入球', pred.btts?.line, pred.btts?.prob, pred.btts?.note, 'fa-check-circle')}
        ${renderDetailBox('角球預測', pred.corners?.line, pred.corners?.prob, pred.corners?.expected, 'fa-flag')}
        ${renderDetailBox('半場預測', pred.ht?.line, pred.ht?.prob, pred.ht?.note, 'fa-clock')}
        <div class="detail-box full-width">
            <h4><i class="fas fa-trophy"></i> 最高概率波膽 (Top 5)</h4>
            <div class="score-predictions">
                ${(pred.scores || []).map((s, i) => `<div class="score-chip ${i === 0 ? 'best' : ''}"><span>${s.score}</span><span class="prob">${s.prob}%</span></div>`).join('')}
            </div>
        </div>
    </div>`;

    // Score Analysis Section
    const sa = pred.score_analysis;
    if (sa) {
        scoreSection.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div class="card-title"><i class="fas fa-bullseye"></i> 波膽專業分析</div>
                <div class="card-subtitle">基於 xG 模型與泊松分佈</div>
            </div>

            <div class="xg-display">
                <div class="xg-item">
                    <div class="xg-value">${sa.home_xg}</div>
                    <div class="xg-label">${pred.home} xG</div>
                </div>
                <div class="xg-vs">VS</div>
                <div class="xg-item">
                    <div class="xg-value">${sa.away_xg}</div>
                    <div class="xg-label">${pred.away} xG</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:15px;">
                <div class="detail-box">
                    <h4><i class="fas fa-list-ol"></i> 全場波膽 Top 10</h4>
                    <table class="score-table">
                        <thead><tr><th>波膽</th><th>概率</th><th>賠率</th></tr></thead>
                        <tbody>
                            ${(sa.all_scores || []).map(s => `<tr><td class="score-cell">${s.score}</td><td class="prob-cell">${s.prob}%</td><td class="odds-cell">${(100/s.prob).toFixed(2)}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="detail-box">
                    <h4><i class="fas fa-hourglass-half"></i> 半場波膽 (HT)</h4>
                    <table class="score-table">
                        <thead><tr><th>HT波膽</th><th>概率</th></tr></thead>
                        <tbody>
                            ${(pred.ht_scores || []).map(s => `<tr><td class="score-cell">${s.score}</td><td class="prob-cell">${s.prob}%</td></tr>`).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top:10px;padding:10px;background:var(--card-light);border-radius:8px;font-size:12px;">
                        <div style="font-weight:700;color:var(--info);margin-bottom:5px;"><i class="fas fa-info-circle"></i> HT 預測</div>
                        <div style="color:var(--text-muted);">${pred.ht?.prob || ''}</div>
                    </div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px;">
                <div class="detail-box">
                    <h4><i class="fas fa-coins"></i> 精確比分賠率</h4>
                    <div class="score-predictions">
                        ${(pred.exact_odds || []).map(eo => `<div class="score-chip"><span>${eo.score}</span><span class="prob" style="color:var(--accent);">@${eo.odds}</span></div>`).join('')}
                    </div>
                </div>
                <div class="detail-box">
                    <h4><i class="fas fa-star"></i> 最高概率波膽</h4>
                    <div style="font-size:32px;font-weight:900;color:var(--primary);text-align:center;margin:10px 0;">${sa.most_likely}</div>
                    <div style="font-size:12px;color:var(--text-muted);text-align:center;">預期總入球: ${(parseFloat(sa.home_xg) + parseFloat(sa.away_xg)).toFixed(1)}</div>
                </div>
            </div>

            <div class="recommendation-box">
                <div class="title"><i class="fas fa-lightbulb"></i> 波膽投注建議</div>
                <div>${sa.recommendation || ''}</div>
                <div style="margin-top:8px;color:var(--text-muted);">
                    <i class="fas fa-chart-bar" style="color:var(--primary);margin-right:5px;"></i>
                    建議投注組合: ${pred.scores?.slice(0,3).map(s => s.score).join(' / ') || ''}
                </div>
            </div>
        </div>`;
    }

    // Motivation
    const motivation = appData.motivation;
    if (motivation) {
        document.getElementById('motivationSection').innerHTML = `
        <div class="card">
            <div class="card-header">
                <div class="card-title"><i class="fas fa-fire"></i> 戰意分析引擎 (${motivation.round || 'R3'})</div>
                <div class="card-subtitle">${motivation.subtitle || '小組賽關鍵戰意評分'}</div>
            </div>
            <div class="motivation-card">
                ${motivation.teams.map(t => `<div class="motivation-bar"><div class="motivation-team">${t.name}</div><div class="motivation-track"><div class="motivation-fill ${t.level}" style="width: ${t.score * 10}%">${t.label}</div></div><div class="motivation-score">${t.score}</div></div>`).join('')}
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:10px;line-height:1.6;"><i class="fas fa-info-circle" style="color:var(--primary);margin-right:5px;"></i>${motivation.note || ''}</div>
        </div>`;
    }

    // Weather
    const weather = appData.weather;
    if (weather) {
        document.getElementById('weatherSection').innerHTML = `
        <div class="card">
            <div class="card-header"><div class="card-title"><i class="fas fa-cloud-sun"></i> 場地與天氣因素</div></div>
            <div class="venue-card"><img src="${weather.venue_image}" alt="${weather.venue}" class="venue-image"><div class="venue-overlay"><h3>${weather.venue}</h3><p>${weather.location} | 海拔: ${weather.altitude}</p><div class="venue-tags">${weather.tags.map(t => `<span class="venue-tag">${t}</span>`).join('')}</div></div></div>
            <div class="weather-card"><div class="weather-icon"><i class="fas fa-${weather.icon}"></i></div><div class="weather-info"><h4>${weather.location} - ${weather.condition}</h4><p>${weather.forecast_time}</p><div class="weather-stats"><div class="weather-stat"><i class="fas fa-thermometer-half"></i><span>${weather.temp}</span></div><div class="weather-stat"><i class="fas fa-tint"></i><span>${weather.humidity}</span></div><div class="weather-stat"><i class="fas fa-wind"></i><span>${weather.wind}</span></div></div></div></div>
            <div style="margin-top:15px;padding:15px;background:var(--card-light);border-radius:12px;font-size:13px;line-height:1.8;"><div style="font-weight:700;margin-bottom:8px;color:var(--primary);"><i class="fas fa-exclamation-triangle" style="margin-right:8px;"></i>場地影響分析</div>${weather.analysis.map(a => `<div>• ${a}</div>`).join('')}</div>
        </div>`;
    }
}

function renderDetailBox(title, line, prob, extra, icon) {
    if (!line && !prob) return '';
    return `<div class="detail-box"><h4><i class="fas ${icon}"></i> ${title} ${line || ''}</h4><div style="font-size:24px;font-weight:900;color:var(--primary);margin:10px 0;">${prob}</div><div style="font-size:12px;color:var(--text-muted);">${extra || ''}</div></div>`;
}

function renderLiveBetting() {
    const grid = document.getElementById('liveBettingGrid');
    const alerts = document.getElementById('upsetAlertContainer');
    const live = appData.live_betting;
    if (!live) { grid.innerHTML = '<div class="card" style="text-align:center;padding:40px;">暫無滾球數據</div>'; return; }
    if (live.alerts && live.alerts.length > 0) {
        alerts.innerHTML = live.alerts.map(a => `<div class="alert ${a.type}"><div class="alert-icon"><i class="fas ${a.icon}"></i></div><div class="alert-content"><h4>${a.title}</h4><p>${a.text}</p></div></div>`).join('');
    } else { alerts.innerHTML = ''; }
    grid.innerHTML = (live.strategies || []).map(s => `
        <div class="betting-card ${s.highlight ? 'highlight' : ''}">
            <h4><i class="fas ${s.icon}"></i> ${s.title}</h4>
            <div style="font-size:13px;color:var(--text-muted);margin:10px 0;">${s.subtitle}</div>
            <div class="betting-odds"><div><div style="font-size:12px;color:var(--text-muted);">${s.market}</div><div class="odds-value">${s.odds}</div></div><div class="odds-trend ${s.trend}"><i class="fas fa-arrow-${s.trend}"></i> ${s.trend_value}</div></div>
            <div class="confidence-meter"><div class="confidence-fill ${s.confidence_level}" style="width: ${s.confidence}%"></div></div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:5px;">信心指數: ${s.confidence}%</div>
        </div>`).join('');
    const segments = live.time_segments;
    if (segments) {
        document.getElementById('timeSegmentSection').innerHTML = `
        <div class="card" style="margin-top:15px;">
            <div class="card-header"><div class="card-title"><i class="fas fa-stopwatch"></i> 時間段進球概率</div></div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">

function switchTab(tabId, topBtn = null, bottomBtn = null) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    if (topBtn) topBtn.classList.add('active');
    else { const tabs = document.getElementById('topNav').querySelectorAll('.nav-tab'); const map = { 'today': 0, 'groups': 1, 'predictions': 2, 'live': 3, 'analysis': 4 }; if (tabs[map[tabId]]) tabs[map[tabId]].classList.add('active'); }
    document.querySelectorAll('.bottom-nav-item').forEach(t => t.classList.remove('active'));
    if (bottomBtn) bottomBtn.classList.add('active');
    else { const items = document.querySelector('.bottom-nav').querySelectorAll('.bottom-nav-item'); const map = { 'today': 0, 'groups': 1, 'predictions': 2, 'live': 3, 'analysis': 4 }; if (items[map[tabId]]) items[map[tabId]].classList.add('active'); }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectMatch(matchId) {
    selectedMatchId = matchId;
    const match = appData.matches?.today?.find(m => m.id === matchId);
    if (!match) return;
    if (!appData.predictions) appData.predictions = {};
    appData.predictions.selected = {
        home: match.home, away: match.away,
        home_flag: match.home_flag, away_flag: match.away_flag,
        home_fifa: match.home_fifa, away_fifa: match.away_fifa,
        probabilities: match.predictions, odds: match.odds,
        handicap: match.handicap, ou: match.ou, btts: match.btts,
        corners: match.corners, ht: match.ht,
        scores: match.scores, ht_scores: match.ht_scores,
        exact_odds: match.exact_odds, score_analysis: match.score_analysis
    };
    renderPredictions();
    switchTab('predictions');
}

function checkLiveMatches() {
    const matches = appData.matches?.today || [];
    const hasLive = matches.some(m => m.status === 'live');
    document.getElementById('liveBadge').style.display = hasLive ? 'inline' : 'none';
    document.getElementById('bottomLiveBadge').style.display = hasLive ? 'block' : 'none';
}

function updateStandingsTime() {
    document.getElementById('standingsTime').textContent = new Date().toLocaleString('zh-HK', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
