<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>世界盃2026 智能預測中心</title>
    <style>
        :root {
            --primary: #00d4aa;
            --secondary: #ff6b35;
            --accent: #ffd700;
            --dark: #0a0e1a;
            --card: #111827;
            --border: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --danger: #ef4444;
            --success: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, "PingFang HK", "Noto Sans CJK", sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .header {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; color: var(--accent); font-weight: 700; }
        .live-dot {
            width: 8px; height: 8px; background: var(--danger);
            border-radius: 50%; display: inline-block;
            animation: pulse 2s infinite; margin-right: 6px;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .nav-tabs {
            display: flex; overflow-x: auto; gap: 8px;
            padding: 10px 16px; background: var(--card);
            border-bottom: 1px solid var(--border); scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tab {
            flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
            background: var(--border); color: var(--muted); font-size: 13px;
            border: none; cursor: pointer; transition: all 0.3s; font-weight: 500;
        }
        .nav-tab.active { background: var(--primary); color: #000; }
        .section { display: none; padding: 16px; padding-bottom: 80px; }
        .section.active { display: block; }
        .card {
            background: var(--card); border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 12px;
            overflow: hidden; transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-header {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-title { font-size: 15px; font-weight: 600; color: var(--accent); }
        .card-body { padding: 12px 16px; }
        .match-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid var(--border);
        }
        .match-row:last-child { border-bottom: none; }
        .team-side { display: flex; align-items: center; gap: 10px; flex: 1; }
        .team-side.away { justify-content: flex-end; flex-direction: row-reverse; text-align: right; }
        .team-flag { width: 32px; height: 32px; border-radius: 50%; background: var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            flex-shrink: 0; border: 2px solid var(--primary);
        }
        .team-name { font-size: 14px; font-weight: 600; }
        .score-box {
            background: var(--dark); padding: 8px 16px; border-radius: 8px;
            font-size: 18px; font-weight: 700; color: var(--accent);
            border: 1px solid var(--primary); min-width: 60px; text-align: center;
        }
        .match-time { font-size: 11px; color: var(--muted); text-align: center; margin-top: 4px; }
        .match-status { font-size: 11px; color: var(--secondary); text-align: center; font-weight: 600; }
        .badge {
            display: inline-block; padding: 3px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600; margin-left: 6px;
        }
        .badge-hot { background: rgba(255,107,53,0.2); color: var(--secondary); }
        .badge-live { background: rgba(239,68,68,0.2); color: var(--danger); }
        .badge-ml { background: rgba(0,212,170,0.2); color: var(--primary); }
        .prediction-bar {
            height: 6px; border-radius: 3px; background: var(--border);
            margin-top: 8px; overflow: hidden; display: flex;
        }
        .pred-h { background: var(--primary); }
        .pred-d { background: var(--accent); }
        .pred-a { background: var(--secondary); }
        .odds-row {
            display: flex; justify-content: space-between; margin-top: 10px;
            gap: 8px;
        }
        .odds-box {
            flex: 1; text-align: center; padding: 10px 6px;
            background: var(--dark); border-radius: 8px; border: 1px solid var(--border);
        }
        .odds-label { font-size: 10px; color: var(--muted); }
        .odds-value { font-size: 16px; font-weight: 700; color: var(--text); margin-top: 2px; }
        .odds-value.highlight { color: var(--primary); }
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
        }
        .stat-item { text-align: center; padding: 10px; background: var(--dark); border-radius: 8px; }
        .stat-label { font-size: 10px; color: var(--muted); }
        .stat-value { font-size: 16px; font-weight: 700; margin-top: 4px; }
        .corner-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px;
        }
        .corner-item { padding: 10px; background: var(--dark); border-radius: 8px; text-align: center; }
        .progress-ring {
            width: 50px; height: 50px; margin: 0 auto 6px;
        }
        .progress-ring circle { fill: none; stroke-width: 4; }
        .progress-bg { stroke: var(--border); }
        .progress-fill { stroke: var(--primary); stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
        .progress-text { font-size: 12px; font-weight: 700; fill: var(--text); }
        .btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: var(--secondary); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .detail-panel {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
            background: rgba(0,0,0,0.3);
        }
        .detail-panel.open { max-height: 800px; }
        .detail-inner { padding: 12px 16px; }
        .weather-info {
            display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
            margin-top: 6px;
        }
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            flex-shrink: 0; padding: 6px 14px; border-radius: 16px;
            background: var(--border); color: var(--muted); font-size: 12px;
            border: 1px solid transparent; cursor: pointer;
        }
        .filter-chip.active { border-color: var(--primary); color: var(--primary); background: rgba(0,212,170,0.1); }
        .standing-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .standing-table th { text-align: left; padding: 10px 8px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
        .standing-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
        .standing-table tr:last-child td { border-bottom: none; }
        .pos-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: var(--border); }
        .pos-q { background: var(--primary); color: #000; }
        .pos-p { background: var(--accent); color: #000; }
        .value-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
        }
        .value-good { background: rgba(34,197,94,0.15); color: var(--success); }
        .value-bad { background: rgba(239,68,68,0.15); color: var(--danger); }
        .ws-status {
            position: fixed; bottom: 70px; right: 16px;
            background: var(--card); padding: 8px 14px; border-radius: 20px;
            border: 1px solid var(--border); font-size: 12px; z-index: 999;
            display: flex; align-items: center; gap: 6px;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 8px 0;
            z-index: 1000;
        }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 2px; padding: 4px 12px; color: var(--muted); font-size: 10px;
            border: none; background: none; cursor: pointer;
        }
        .bottom-nav-item.active { color: var(--primary); }
        .bottom-nav-item svg { width: 22px; height: 22px; }
        .loading { text-align: center; padding: 40px; color: var(--muted); }
        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
        .tooltip { position: relative; }
        .tooltip::after {
            content: attr(data-tip); position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%); padding: 6px 10px; background: #000;
            color: #fff; font-size: 11px; border-radius: 6px; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: opacity 0.2s; margin-bottom: 6px;
        }
        .tooltip:hover::after { opacity: 1; }
        .motivation-bar {
            height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px;
        }
        .motivation-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        .motivation-high { background: var(--success); }
        .motivation-med { background: var(--accent); }
        .motivation-low { background: var(--danger); }
        .group-header {
            background: linear-gradient(90deg, var(--primary), transparent);
            padding: 10px 16px; font-weight: 700; font-size: 14px;
            border-left: 4px solid var(--accent);
        }
        @media (min-width: 768px) {
            .container { max-width: 600px; margin: 0 auto; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>

// ===================== ML 預測引擎 =====================
class MLModel {
    constructor() {
        this.weights = {
            elo: 0.35, form: 0.15, home: 0.12, weather: 0.08,
            altitude: 0.06, motivation: 0.14, corners: 0.10
        };
        this.leagueParams = {
            WC: { avgGoals: 3.0, homeAdv: 0.15, drawRate: 0.22, bttsRate: 0.68, avgCorners: 9.2 }
        };
    }

    sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

    predict1X2(match) {
        const h = WC2026_DATA.teams[match.home];
        const a = WC2026_DATA.teams[match.away];
        if (!h || !a) return null;

        const eloDiff = h.elo - a.elo;
        const venue = WC2026_DATA.venues[match.venue] || {};
        const altitude = venue.altitude || 0;
        const homeAdv = match.home === '墨西哥' && altitude > 2000 ? 0.25 : 0.12;

        // 戰意分析 (R3關鍵)
        let motH = 0.5, motA = 0.5;
        if (match.round === 'R3') {
            const standings = getStandings(match.group);
            const posH = standings.findIndex(t => t.name === match.home);
            const posA = standings.findIndex(t => t.name === match.away);
            if (posH >= 2) motH = 0.85; else if (posH === 0) motH = 0.35;
            if (posA >= 2) motA = 0.85; else if (posA === 0) motA = 0.35;
        }

        const weatherFactor = match.weather && match.weather.temp > 30 ? -0.05 : 0;
        const altitudeFactor = altitude > 1500 ? (h.conf === 'CONMEBOL' ? 0.08 : -0.06) : 0;

        const hStrength = this.sigmoid((eloDiff * this.weights.elo + homeAdv * 100 + motH * 100 * this.weights.motivation + weatherFactor * 100 + altitudeFactor * 100) / 100);
        const aStrength = this.sigmoid((-eloDiff * this.weights.elo - homeAdv * 100 + motA * 100 * this.weights.motivation - weatherFactor * 100 - altitudeFactor * 100) / 100);

        let hProb = hStrength * (1 - this.leagueParams.WC.drawRate) * 0.85;
        let aProb = aStrength * (1 - this.leagueParams.WC.drawRate) * 0.85;
        let dProb = this.leagueParams.WC.drawRate;

        const total = hProb + dProb + aProb;
        return {
            home: (hProb / total * 100).toFixed(1),
            draw: (dProb / total * 100).toFixed(1),
            away: (aProb / total * 100).toFixed(1),
            recommendation: hProb > aProb ? `主勝 ${(hProb/aProb).toFixed(2)}` : `客勝 ${(aProb/hProb).toFixed(2)}`,
            confidence: Math.abs(hProb - aProb) > 0.2 ? '高' : Math.abs(hProb - aProb) > 0.1 ? '中' : '低'
        };
    }

    predictOU(match) {
        const h = WC2026_DATA.teams[match.home];
        const a = WC2026_DATA.teams[match.away];
        if (!h || !a) return null;
        const avgGoals = this.leagueParams.WC.avgGoals;
        const eloDiff = Math.abs(h.elo - a.elo);
        const expected = avgGoals + (eloDiff > 300 ? 0.5 : eloDiff > 150 ? 0.2 : 0) + (match.weather && match.weather.temp > 30 ? -0.3 : 0);
        const overProb = this.sigmoid((expected - 2.5) * 2) * 100;
        return {
            line: 2.5,
            over: overProb.toFixed(1),
            under: (100 - overProb).toFixed(1),
            expected: expected.toFixed(2),
            recommendation: overProb > 55 ? '大球' : overProb < 45 ? '小球' : '觀望'
        };
    }

    predictBTTS(match) {
        const base = this.leagueParams.WC.bttsRate * 100;
        const h = WC2026_DATA.teams[match.home];
        const a = WC2026_DATA.teams[match.away];
        if (!h || !a) return null;
        const eloDiff = Math.abs(h.elo - a.elo);
        const adj = eloDiff > 400 ? -15 : eloDiff > 200 ? -5 : 5;
        const prob = Math.min(85, Math.max(35, base + adj));
        return {
            yes: prob.toFixed(1),
            no: (100 - prob).toFixed(1),
            recommendation: prob > 55 ? '雙方入球' : '否'
        };
    }

    predictCorners(match) {
        const h = WC2026_DATA.teams[match.home];
        const a = WC2026_DATA.teams[match.away];
        if (!h || !a) return null;
        const base = this.leagueParams.WC.avgCorners;
        const eloDiff = Math.abs(h.elo - a.elo);
        const dominance = eloDiff > 300 ? 1.15 : eloDiff > 150 ? 1.05 : 0.95;
        const weatherMult = match.weather && match.weather.temp > 30 ? 0.9 : 1.0;
        const expected = base * dominance * weatherMult;
        const line = Math.round(expected);
        const overProb = this.sigmoid((expected - line) * 3) * 100;
        return {
            line: line,
            expected: expected.toFixed(1),
            over: overProb.toFixed(1),
            under: (100 - overProb).toFixed(1),
            recommendation: overProb > 55 ? `大${line}` : overProb < 45 ? `小${line}` : `觀望${line}`
        };
    }

    predictHandicap(match) {
        const pred = this.predict1X2(match);
        const h = WC2026_DATA.teams[match.home];
        const a = WC2026_DATA.teams[match.away];
        if (!h || !a || !pred) return null;
        const eloDiff = h.elo - a.elo;
        let line = 0;
        if (eloDiff > 400) line = -1.0;
        else if (eloDiff > 250) line = -0.75;
        else if (eloDiff > 100) line = -0.5;
        else if (eloDiff > -100) line = 0;
        else if (eloDiff > -250) line = 0.5;
        else line = 0.75;

        const hProb = parseFloat(pred.home) / 100;
        const rec = hProb > 0.55 ? `主讓${line} 上盤` : hProb < 0.45 ? `客讓${line} 下盤` : '觀望';
        return { line, recommendation: rec, homeProb: (hProb * 100).toFixed(1) };
    }

    predictCorrectScore(match) {
        const ou = this.predictOU(match);
        const pred = this.predict1X2(match);
        if (!ou || !pred) return null;
        const expected = parseFloat(ou.expected);
        const h = WC2026_DATA.teams[match.home];
        const a = WC2026_DATA.teams[match.away];
        const hShare = parseFloat(pred.home) / (parseFloat(pred.home) + parseFloat(pred.away));
        const hGoals = Math.round(expected * hShare);
        const aGoals = Math.round(expected * (1 - hShare));
        const scores = [
            `${hGoals}-${aGoals}`,
            `${hGoals+1}-${aGoals}`, `${hGoals}-${aGoals+1}`,
            `${hGoals+1}-${aGoals+1}`, `${hGoals-1}-${aGoals}`, `${hGoals}-${aGoals-1}`
        ].filter(s => !s.includes('-1')).slice(0, 4);
        return { top: scores[0], alternatives: scores.slice(1), prob: (25 + Math.random()*15).toFixed(1) };
    }
}

const ml = new MLModel();

// ===================== 積分榜計算 =====================
function getStandings(group) {
    const teams = Object.entries(WC2026_DATA.teams).filter(([name, data]) => data.group === group).map(([name]) => name);
    const stats = {};
    teams.forEach(t => stats[t] = { name: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 });

    WC2026_DATA.matches.filter(m => m.group === group && m.status === 'finished').forEach(m => {
        if (!stats[m.home] || !stats[m.away]) return;
        stats[m.home].p++; stats[m.away].p++;
        stats[m.home].gf += m.score.h; stats[m.home].ga += m.score.a;
        stats[m.away].gf += m.score.a; stats[m.away].ga += m.score.h;
        if (m.score.h > m.score.a) { stats[m.home].w++; stats[m.home].pts += 3; stats[m.away].l++; }
        else if (m.score.h < m.score.a) { stats[m.away].w++; stats[m.away].pts += 3; stats[m.home].l++; }
        else { stats[m.home].d++; stats[m.away].d++; stats[m.home].pts++; stats[m.away].pts++; }
    });

    return Object.values(stats).map(s => ({ ...s, gd: s.gf - s.ga }))
        .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

// ===================== 渲染函數 =====================
function renderMatchCard(match, showPredict = false, showCorner = false, showHandicap = false) {

    const isUpcoming = match.status === 'upcoming';
    const scoreDisplay = isFinished || isLive ? `${match.score.h} - ${match.score.a}` : 'VS';
    const statusText = isLive ? '進行中' : isFinished ? '已完賽' : match.time;
    const statusColor = isLive ? 'color:var(--danger)' : isFinished ? '' : 'color:var(--accent)';

    let extraContent = '';
    if (showPredict && isUpcoming) {
        const p1x2 = ml.predict1X2(match);
        const pou = ml.predictOU(match);
        const pbtts = ml.predictBTTS(match);
        const pscore = ml.predictCorrectScore(match);

            extraContent = `
            <div class="detail-panel" id="detail-${match.id}">
                <div class="detail-inner">
                    <div style="margin-bottom:10px"><strong style="color:var(--accent)">🎯 1X2 預測</strong></div>
                    <div class="prediction-bar">
                        <div class="pred-h" style="width:${p1x2.home}%"></div>
                        <div class="pred-d" style="width:${p1x2.draw}%"></div>
                        <div class="pred-a" style="width:${p1x2.away}%"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px;color:var(--muted)">
                        <span>主 ${p1x2.home}%</span><span>和 ${p1x2.draw}%</span><span>客 ${p1x2.away}%</span>
                    </div>
                    <div style="margin-top:10px"><strong style="color:var(--accent)">⚽ 大小球</strong></div>
                    <div class="odds-row">
                        <div class="odds-box"><div class="odds-label">大${pou.line}</div><div class="odds-value ${parseFloat(pou.over)>55?'highlight':''}">${pou.over}%</div></div>
                        <div class="odds-box"><div class="odds-label">預期入球</div><div class="odds-value">${pou.expected}</div></div>
                        <div class="odds-box"><div class="odds-label">小${pou.line}</div><div class="odds-value">${pou.under}%</div></div>
                    </div>
                    <div style="margin-top:10px"><strong style="color:var(--accent)">🤝 BTTS</strong></div>
                    <div class="odds-row">
                        <div class="odds-box"><div class="odds-label">是</div><div class="odds-value ${parseFloat(pbtts.yes)>55?'highlight':''}">${pbtts.yes}%</div></div>
                        <div class="odds-box"><div class="odds-label">否</div><div class="odds-value">${pbtts.no}%</div></div>
                    </div>
                    <div style="margin-top:10px"><strong style="color:var(--accent)">🎲 波膽首選</strong></div>
                    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
                        <span class="value-tag value-good">${pscore.top} (${pscore.prob}%)</span>
                        ${pscore.alternatives.map(s => `<span class="value-tag" style="background:var(--border);color:var(--muted)">${s}</span>`).join('')}
                    </div>
                    <div style="margin-top:10px;font-size:12px;color:var(--muted)">
                        💡 <strong style="color:var(--primary)">${p1x2.recommendation}</strong> | 信心: ${p1x2.confidence}
                    </div>
                </div>
            </div>`;
        }
    }

    if (showCorner && isUpcoming) {
        const pc = ml.predictCorners(match);
        if (pc) {
            extraContent = `
            <div class="detail-panel" id="detail-${match.id}">
                <div class="detail-inner">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                        <strong style="color:var(--accent)">📐 角球預測</strong>
                        <span class="badge badge-ml">預期 ${pc.expected} 角</span>
                    </div>
                    <div class="corner-grid">
                        <div class="corner-item">
                            <div style="font-size:24px;font-weight:700;color:var(--primary)">${pc.line}</div>
                            <div style="font-size:11px;color:var(--muted)">盤口</div>
                        </div>
                        <div class="corner-item">
                            <div style="font-size:24px;font-weight:700;color:var(--accent)">${pc.expected}</div>
                            <div style="font-size:11px;color:var(--muted)">預期角球</div>
                        </div>
                        <div class="corner-item">
                            <div style="font-size:24px;font-weight:700;color:var(--success)">${pc.over}%</div>
                            <div style="font-size:11px;color:var(--muted)">大${pc.line}機率</div>
                        </div>
                        <div class="corner-item">
                            <div style="font-size:24px;font-weight:700;color:var(--secondary)">${pc.under}%</div>
                            <div style="font-size:11px;color:var(--muted)">小${pc.line}機率</div>
                        </div>
                    </div>
                    <div style="margin-top:10px"><strong style="color:var(--accent)">🎯 推薦</strong> <span style="color:var(--primary);font-weight:600">${pc.recommendation}</span></div>
                    <div style="margin-top:8px;font-size:11px;color:var(--muted)">
                        因素: ${match.weather && match.weather.temp > 30 ? '高溫抑制(-10%) ' : ''}${WC2026_DATA.venues[match.venue]?.altitude > 1500 ? '高海拔修正 ' : ''}控球差異
                    </div>
                </div>
            </div>`;
        }
    }

    if (showHandicap && isUpcoming) {
        const ph = ml.predictHandicap(match);
        const p1x2 = ml.predict1X2(match);
        if (ph && p1x2) {
            extraContent = `
            <div class="detail-panel" id="detail-${match.id}">
                <div class="detail-inner">
                    <div style="margin-bottom:10px"><strong style="color:var(--accent)">⚖️ 亞洲讓球分析</strong></div>
                    <div class="odds-row">
                        <div class="odds-box">
                            <div class="odds-label">讓球盤</div>
                            <div class="odds-value" style="color:var(--primary)">${match.home} ${ph.line > 0 ? '+' : ''}${ph.line}</div>
                        </div>
                        <div class="odds-box">
                            <div class="odds-label">主勝機率</div>
                            <div class="odds-value ${parseFloat(ph.homeProb)>55?'highlight':''}">${ph.homeProb}%</div>
                        </div>
                        <div class="odds-box">
                            <div class="odds-label">推薦</div>
                            <div class="odds-value" style="font-size:13px">${ph.recommendation}</div>
                        </div>
                    </div>
                    <div style="margin-top:10px;font-size:12px;color:var(--muted)">
                        基於 Elo差 ${h.elo - a.elo} | 主場優勢 ${match.home === '墨西哥' && WC2026_DATA.venues[match.venue]?.altitude > 2000 ? '高海拔加成' : '標準'}
                    </div>
                </div>
            </div>`;
        }
    }

    const weatherInfo = match.weather ? `
        <div class="weather-info">
            <span>🌡️ ${match.weather.temp}°C</span>
            <span>${match.weather.condition}</span>
            <span>💧 ${match.weather.humidity}%</span>
        </div>
    ` : '';

    const venueInfo = WC2026_DATA.venues[match.venue] ? `
        <div class="weather-info">
            <span>📍 ${match.venue}</span>
            <span>🏔️ ${WC2026_DATA.venues[match.venue].altitude}m</span>
        </div>
    ` : '';

    const badges = [];
    if (match.round === 'R3') badges.push('<span class="badge badge-hot">關鍵戰</span>');
    if (isLive) badges.push('<span class="badge badge-live">LIVE</span>');

    return `
        <div class="card" onclick="toggleDetail(${match.id})">
            <div class="card-header">
                <div>
                    <span style="font-size:12px;color:var(--muted)">${match.group ? match.group + '組' : ''} ${match.round} ${match.date}</span>
                    ${badges.join('')}
                </div>
                <span style="font-size:12px;color:var(--muted)">${match.time}</span>
            </div>
            <div class="card-body">
                <div class="match-row">
                    <div class="team-side">
                        <div class="team-flag">${h.flag}</div>
                        <div>
                            <div class="team-name">${match.home}</div>
                            <div style="font-size:11px;color:var(--muted)">Elo: ${h.elo}</div>
                        </div>
                    </div>
                    <div>
                        <div class="score-box">${scoreDisplay}</div>
                        <div class="match-status" style="${statusColor}">${statusText}</div>
                    </div>
                    <div class="team-side away">
                        <div class="team-flag">${a.flag}</div>
                        <div>
                            <div class="team-name">${match.away}</div>
                            <div style="font-size:11px;color:var(--muted)">Elo: ${a.elo}</div>
                        </div>
                    </div>
                </div>
                ${venueInfo}
                ${weatherInfo}
            </div>
            ${extraContent}
        </div>
    `;
}

function toggleDetail(id) {
    const panel = document.getElementById(`detail-${id}`);
    if (panel) panel.classList.toggle('open');
}

// ===================== 分頁渲染 =====================
function renderToday(filter = 'all') {
    const today = '2026-06-24'; // 模擬當前日期
    let matches = WC2026_DATA.matches.filter(m => m.date === today || m.date === '2026-06-23');
    if (filter === 'live') matches = matches.filter(m => m.status === 'live');
    else if (filter === 'upcoming') matches = matches.filter(m => m.status === 'upcoming');
    else if (filter === 'finished') matches = matches.filter(m => m.status === 'finished');

    const container = document.getElementById('todayMatches');
    if (matches.length === 0) {
        container.innerHTML = '<div class="empty-state"><div>📅</div><div>暫無賽事</div></div>';
        return;
    }
    container.innerHTML = matches.map(m => renderMatchCard(m)).join('');
}

function renderSchedule(filter = 'all') {
    let matches = WC2026_DATA.matches;
    if (filter !== 'all') matches = matches.filter(m => m.round === filter);

    const container = document.getElementById('scheduleMatches');
    if (matches.length === 0) {
        container.innerHTML = '<div class="empty-state"><div>📅</div><div>暫無賽事</div></div>';
        return;
    }

    // 按日期分組
    const byDate = {};
    matches.forEach(m => {
        if (!byDate[m.date]) byDate[m.date] = [];
        byDate[m.date].push(m);
    });

    container.innerHTML = Object.entries(byDate).map(([date, ms]) => `
        <div style="margin-bottom:16px">
            <div style="padding:8px 0;font-size:13px;color:var(--accent);font-weight:600;border-bottom:1px solid var(--border);margin-bottom:8px">
                📅 ${date}
            </div>
            ${ms.map(m => renderMatchCard(m)).join('')}
        </div>
    `).join('');
}

function renderPredict() {
    const upcoming = WC2026_DATA.matches.filter(m => m.status === 'upcoming');
    const container = document.getElementById('predictMatches');
    container.innerHTML = upcoming.slice(0, 8).map(m => renderMatchCard(m, true)).join('');
}

function renderCorner() {
    const upcoming = WC2026_DATA.matches.filter(m => m.status === 'upcoming');
    const container = document.getElementById('cornerMatches');
    container.innerHTML = upcoming.slice(0, 8).map(m => renderMatchCard(m, false, true)).join('');
}

function renderHandicap() {
    const upcoming = WC2026_DATA.matches.filter(m => m.status === 'upcoming');
    const container = document.getElementById('handicapMatches');
    container.innerHTML = upcoming.slice(0, 8).map(m => renderMatchCard(m, false, false, true)).join('');
}

function renderStandings(group = 'A') {
    const standings = getStandings(group);
    const container = document.getElementById('standingsContent');
    container.innerHTML = `
        <div class="card">
            <div class="group-header">${group}組 積分榜</div>
            <div style="padding:8px">
                <table class="standing-table">
                    <tr><th>#</th><th>球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>得</th><th>失</th><th>差</th><th>分</th></tr>
                    ${standings.map((t, i) => `
                        <tr>
                            <td><div class="pos-num ${i<2?'pos-q':i<3?'pos-p':''}">${i+1}</div></td>
                            <td style="font-weight:600">${WC2026_DATA.teams[t.name]?.flag || ''} ${t.name}</td>
                            <td>${t.p}</td>
                            <td>${t.w}</td>
                            <td>${t.d}</td>
                            <td>${t.l}</td>
                            <td>${t.gf}</td>
                            <td>${t.ga}</td>
                            <td style="color:${t.gd>0?'var(--success)':t.gd<0?'var(--danger)':'var(--muted)'}">${t.gd>0?'+':''}${t.gd}</td>
                            <td style="font-weight:700;color:var(--accent)">${t.pts}</td>
                        </tr>
                    `).join('')}
                </table>
            </div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;font-size:11px;color:var(--muted)">
            <span><span style="display:inline-block;width:12px;height:12px;background:var(--primary);border-radius:50%;vertical-align:middle"></span> 出線</span>
            <span><span style="display:inline-block;width:12px;height:12px;background:var(--accent);border-radius:50%;vertical-align:middle"></span> 第三輪機會</span>
        </div>
    `;
}

// ===================== 交互控制 =====================
let currentTab = 'today';
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.bottom-nav-item').forEach(t => t.classList.remove('active'));

    document.getElementById(tab).classList.add('active');
    event?.target?.classList.add('active');

    if (tab === 'today') renderToday();
    else if (tab === 'schedule') renderSchedule();
    else if (tab === 'predict') renderPredict();
    else if (tab === 'corner') renderCorner();
    else if (tab === 'handicap') renderHandicap();
    else if (tab === 'standings') renderStandings('A');
}

function filterToday(type) {
    document.querySelectorAll('#todayFilter .filter-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    renderToday(type);
}

function filterSchedule(round) {
    document.querySelectorAll('#scheduleFilter .filter-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    renderSchedule(round);
}

function showGroup(group) {
    document.querySelectorAll('#standingsFilter .filter-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    renderStandings(group);
}

// ===================== WebSocket 模擬 =====================
function initWebSocket() {
    const wsStatus = document.getElementById('wsStatus');
    let connected = false;

    function connect() {
        wsStatus.innerHTML = '<span class="live-dot"></span>實時數據連接中...';
        setTimeout(() => {
            connected = true;
            wsStatus.innerHTML = '<span class="live-dot"></span>實時數據已連接';
            wsStatus.style.borderColor = 'var(--primary)';
        }, 1500);
    }

    connect();

    // 模擬實時更新
    setInterval(() => {
        if (!connected) return;
        const liveMatches = WC2026_DATA.matches.filter(m => m.status === 'live');
        if (liveMatches.length > 0 && Math.random() > 0.7) {
            const match = liveMatches[Math.floor(Math.random() * liveMatches.length)];
            if (Math.random() > 0.5) match.score.h++;
            else match.score.a++;
            if (currentTab === 'today') renderToday();
        }
    }, 30000);
}
