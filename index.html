<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNIFIED WC2026 預測中心 v3.3.60 | 真實賠率分析版</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--accent:#00d4ff;--accent2:#ff6b35;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e5e7eb;--text2:#9ca3af;--border:#1f2937}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}
.container{max-width:100%;padding:12px}
.header{text-align:center;padding:16px 0;border-bottom:2px solid var(--accent);margin-bottom:16px;position:sticky;top:0;background:var(--bg);z-index:100}
.header h1{font-size:1.3rem;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .version{color:var(--text2);font-size:0.75rem;margin-top:4px}
.nav{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:16px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.8rem;cursor:pointer;transition:all .2s}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;font-weight:600}
.section{display:none}
.section.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:0.95rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card-title .icon{font-size:1.1rem}
.match-row{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s}
.match-row:last-child{border-bottom:none}
.match-row:active{background:rgba(0,212,255,0.05)}
.team{display:flex;align-items:center;gap:8px;font-weight:600;font-size:0.9rem}
.team-flag{font-size:1.4rem}
.vs{color:var(--text2);font-size:0.75rem;font-weight:500}
.match-time{color:var(--accent);font-size:0.75rem;font-weight:600;min-width:50px;text-align:center}
.match-status{font-size:0.7rem;padding:3px 8px;border-radius:10px;background:rgba(16,185,129,0.15);color:var(--green);font-weight:600}
.match-status.upcoming{background:rgba(245,158,11,0.15);color:var(--yellow)}
.odds-ev{display:flex;gap:6px;margin-top:6px}
.odds-ev span{font-size:0.7rem;padding:2px 6px;border-radius:4px;font-weight:600}
.ev-positive{background:rgba(16,185,129,0.2);color:var(--green)}
.ev-negative{background:rgba(239,68,68,0.2);color:var(--red)}
.ev-neutral{background:rgba(156,163,175,0.2);color:var(--text2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-box{text-align:center;padding:12px;background:rgba(0,212,255,0.05);border-radius:8px;border:1px solid rgba(0,212,255,0.1)}
.stat-label{font-size:0.7rem;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:1.1rem;font-weight:700;color:var(--accent)}
.stat-value.red{color:var(--red)}
.stat-value.green{color:var(--green)}
.btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;margin-top:10px}
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-small{padding:6px 12px;font-size:0.75rem;width:auto;display:inline-block}
.select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem;margin-bottom:10px}
.input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem;margin-bottom:8px}
.textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.8rem;min-height:80px;resize:vertical}
.bookmaker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
@media(min-width:480px){.bookmaker-grid{grid-template-columns:repeat(3,1fr)}}
.bookmaker-card{padding:10px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);text-align:center}
.bookmaker-name{font-size:0.75rem;color:var(--text2);margin-bottom:6px}
.odds-value{font-size:1.2rem;font-weight:700;color:var(--accent)}
.odds-value.best{color:var(--green)}
.odds-value.worst{color:var(--red)}
.implied-prob{font-size:0.65rem;color:var(--text2);margin-top:2px}
.value-tag{font-size:0.65rem;padding:2px 6px;border-radius:4px;margin-top:4px;display:inline-block;font-weight:600}
.value-good{background:rgba(16,185,129,0.25);color:var(--green)}
.value-bad{background:rgba(239,68,68,0.25);color:var(--red)}
.value-fair{background:rgba(245,158,11,0.25);color:var(--yellow)}
.odds-comparison-table{width:100%;font-size:0.75rem;border-collapse:collapse;margin-top:10px}
.odds-comparison-table th{text-align:left;padding:8px;color:var(--text2);border-bottom:1px solid var(--border);font-weight:600}
.odds-comparison-table td{padding:8px;border-bottom:1px solid var(--border)}
.odds-comparison-table tr:last-child td{border-bottom:none}
.trend-up{color:var(--green)}
.trend-down{color:var(--red)}
.trend-flat{color:var(--text2)}
.loading{text-align:center;padding:20px;color:var(--text2);font-size:0.85rem}
.loading::after{content:"";display:inline-block;width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:12px;border-radius:8px;font-size:0.8rem;margin-bottom:10px}
.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--green);padding:12px;border-radius:8px;font-size:0.8rem;margin-bottom:10px}
.api-status{display:inline-flex;align-items:center;gap:6px;font-size:0.7rem;padding:4px 10px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:12px}
.api-status.connected{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:var(--green)}
.api-status.disconnected{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red)}
.api-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.odds-summary{display:flex;gap:10px;overflow-x:auto;padding:4px 0;margin-bottom:12px;scrollbar-width:none}
.odds-summary::-webkit-scrollbar{display:none}
.odds-summary-item{flex-shrink:0;padding:10px 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);min-width:140px;text-align:center}
.odds-summary-item .label{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.odds-summary-item .value{font-size:1rem;font-weight:700;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:0.8rem;cursor:pointer;font-weight:500}
.tab-btn.active{background:rgba(0,212,255,0.1);color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.home{background:linear-gradient(90deg,var(--accent),#0088ff)}
.progress-fill.draw{background:linear-gradient(90deg,var(--text2),#6b7280)}
.progress-fill.away{background:linear-gradient(90deg,var(--accent2),#ff4500)}
.prob-diff{font-size:0.7rem;margin-top:4px}
.prob-diff.positive{color:var(--green)}
.prob-diff.negative{color:var(--red)}
.alert-box{padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:0.8rem;display:flex;align-items:center;gap:8px}
.alert-box.info{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);color:var(--accent)}
.alert-box.warning{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:var(--yellow)}
.alert-box.danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red)}
.filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.75rem;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.standings-table{width:100%;font-size:0.75rem;border-collapse:collapse}
.standings-table th{text-align:left;padding:6px;color:var(--text2);border-bottom:1px solid var(--border);font-weight:600}
.standings-table td{padding:6px;border-bottom:1px solid var(--border)}
.standings-table tr.qualified td:first-child{border-left:3px solid var(--green)}
.standings-table tr.eliminated td:first-child{border-left:3px solid var(--red)}
.group-header{background:rgba(0,212,255,0.05);font-weight:700;color:var(--accent)}
.score-input{display:flex;align-items:center;gap:8px;justify-content:center;margin:8px 0}
.score-input input{width:50px;text-align:center;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;font-weight:700}
.prediction-detail{padding:10px;background:rgba(0,212,255,0.03);border-radius:8px;margin-top:8px;border-left:3px solid var(--accent)}
.prediction-detail h4{font-size:0.8rem;color:var(--accent);margin-bottom:6px}
.prediction-detail p{font-size:0.75rem;color:var(--text2);line-height:1.6}
.corner-stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.8rem}
.corner-stat:last-child{border-bottom:none}
.live-indicator{display:inline-flex;align-items:center;gap:4px;color:var(--red);font-size:0.7rem;font-weight:700;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal.active{display:flex}
.modal-content{background:var(--card);border-radius:16px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
.modal-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:10;border-radius:16px 16px 0 0}
.modal-header h3{font-size:1rem}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px}
.odds-timeline{margin-top:12px}
.timeline-item{display:flex;gap:10px;margin-bottom:10px;font-size:0.75rem}
.timeline-time{min-width:60px;color:var(--text2);font-size:0.7rem}
.timeline-content{flex:1}
.timeline-odds-change{display:flex;gap:8px;align-items:center}
.timeline-arrow{color:var(--text2)}
.h2h-odds-box{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.h2h-box{text-align:center;padding:12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);position:relative;overflow:hidden}
.h2h-box .label{font-size:0.7rem;color:var(--text2);margin-bottom:4px}
.h2h-box .odds{font-size:1.3rem;font-weight:700}
.h2h-box .implied{font-size:0.65rem;color:var(--text2);margin-top:2px}
.h2h-box .model-prob{position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:.5}
.h2h-box.highlight{border-color:var(--green);background:rgba(16,185,129,0.05)}
.h2h-box.highlight .odds{color:var(--green)}
.total-odds-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.total-box{text-align:center;padding:12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border)}
.total-box .line{font-size:0.8rem;color:var(--accent);font-weight:600}
.total-box .odds{font-size:1.2rem;font-weight:700;margin-top:4px}
.btts-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.btts-box .total-box{text-align:left;padding:10px}
.btts-box .total-box .label{font-size:0.7rem;color:var(--text2)}
.btts-box .total-box .value{font-size:1.1rem;font-weight:700;margin-top:4px}
.confidence-meter{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.confidence-fill{height:100%;border-radius:2px}
.confidence-high{background:var(--green)}
.confidence-medium{background:var(--yellow)}
.confidence-low{background:var(--red)}
.scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:1.2rem;cursor:pointer;z-index:99;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,212,255,0.3)}
.kelly-calc{padding:12px;background:rgba(0,212,255,0.03);border-radius:8px;margin-top:10px;border:1px solid rgba(0,212,255,0.1)}
.kelly-calc h5{font-size:0.8rem;color:var(--accent);margin-bottom:8px}
.kelly-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.75rem;border-bottom:1px solid var(--border)}
.kelly-row:last-child{border-bottom:none;font-weight:700;color:var(--accent)}
.sport-selector{margin-bottom:12px}
.refresh-btn{position:fixed;top:12px;right:12px;z-index:101;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem}
.odds-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:0.65rem}
.odds-legend span{display:flex;align-items:center;gap:4px}
.odds-legend .dot{width:8px;height:8px;border-radius:2px}
</style>
<base target="_blank">
</head>
<body>
<div class="container">
  <button class="refresh-btn" onclick="refreshAllData()" title="刷新數據">⟳</button>
  <div class="header">
    <h1>🏆 UNIFIED WC2026 預測中心</h1>
    <div class="version">v3.3.60 | 真實賠率分析版 | 72場完整賽程</div>
    <div class="api-status disconnected" id="apiStatus">
      <span class="dot"></span>
      <span id="apiStatusText">賠率API未連接</span>
    </div>
  </div>

  <div class="nav" id="mainNav">
    <button class="nav-btn active" onclick="showSection('matches')">📅 賽程</button>
    <button class="nav-btn" onclick="showSection('odds')">💰 真實賠率</button>
    <button class="nav-btn" onclick="showSection('value')">🎯 價值投注</button>
    <button class="nav-btn" onclick="showSection('standings')">📊 積分榜</button>
    <button class="nav-btn" onclick="showSection('predictions')">🔮 預測</button>
    <button class="nav-btn" onclick="showSection('live')">📡 滾球</button>
    <button class="nav-btn" onclick="showSection('corners')">🚩 角球</button>
    <button class="nav-btn" onclick="showSection('handicap')">📐 讓球</button>
    <button class="nav-btn" onclick="showSection('input')">📝 數據輸入</button>
  </div>

  <!-- 賽程區塊 -->
  <div class="section active" id="matches">
    <div class="card">
      <div class="card-title"><span class="icon">📅</span>最近賽事</div>
      <div id="matchesList"></div>
    </div>
  </div>

  <!-- 真實賠率區塊 -->
  <div class="section" id="odds">
    <div class="card">
      <div class="card-title"><span class="icon">💰</span>真實賠率監控</div>
      <div class="alert-box info">
        <span>ℹ️</span>
        <span>連接 The-Odds-API 獲取實時賠率。選擇賽事查看多家博彩公司對比。</span>
      </div>
      <div class="sport-selector">
        <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:6px">選擇賽事類別 / Sport Key：</label>
        <select class="select" id="sportKeySelect">
          <option value="soccer_fifa_world_cup">FIFA World Cup 2026 (soccer_fifa_world_cup)</option>
          <option value="soccer_world_cup">World Cup (soccer_world_cup)</option>
          <option value="soccer_international_friendlies">國際友誼賽 (soccer_international_friendlies)</option>
          <option value="soccer_uefa_euro">歐洲國家盃 (soccer_uefa_euro)</option>
          <option value="upcoming">全部即將開始 (upcoming)</option>
        </select>
        <div style="display:flex;gap:8px">
          <select class="select" id="regionSelect" style="flex:1">
            <option value="uk,eu">英國 + 歐洲 (UK+EU)</option>
            <option value="uk">英國 (UK)</option>
            <option value="eu">歐洲 (EU)</option>
            <option value="us">美國 (US)</option>
            <option value="au">澳洲 (AU)</option>
          </select>
          <select class="select" id="marketSelect" style="flex:1">
            <option value="h2h">1X2 主客和 (h2h)</option>
            <option value="h2h,totals">1X2 + 大小球 (h2h+totals)</option>
            <option value="h2h,totals,btts">1X2 + 大小球 + BTTS</option>
          </select>
        </div>
        <button class="btn" onclick="fetchRealOdds()">🔄 獲取真實賠率</button>
      </div>
      <div id="oddsLoading"></div>
      <div id="oddsError"></div>
      <div id="oddsContent"></div>
    </div>

    <div class="card" id="oddsDetailCard" style="display:none">
      <div class="card-title"><span class="icon">📊</span>賠率詳情 & 模型對比</div>
      <div id="oddsDetailContent"></div>
    </div>
  </div>

  <!-- 價值投注區塊 -->
  <div class="section" id="value">
    <div class="card">
      <div class="card-title"><span class="icon">🎯</span>價值投注分析 (Value Betting)</div>
      <div class="alert-box warning">
        <span>⚠️</span>
        <span>價值投注 = 模型預測概率 > 賠率隱含概率。僅供參考，請理性投注。</span>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="showValueTab('all')">全部機會</button>
        <button class="tab-btn" onclick="showValueTab('h2h')">1X2</button>
        <button class="tab-btn" onclick="showValueTab('totals')">大小球</button>
        <button class="tab-btn" onclick="showValueTab('btts')">BTTS</button>
      </div>
      <div class="tab-content active" id="valueTab-all">
        <div id="valueAllContent"></div>
      </div>
      <div class="tab-content" id="valueTab-h2h">
        <div id="valueH2hContent"></div>
      </div>
      <div class="tab-content" id="valueTab-totals">
        <div id="valueTotalsContent"></div>
      </div>
      <div class="tab-content" id="valueTab-btts">
        <div id="valueBttsContent"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">📈</span>Kelly 資金管理計算</div>
      <div class="grid-2">
        <div>
          <label style="font-size:0.75rem;color:var(--text2)">資金總額 (Bankroll)</label>
          <input type="number" class="input" id="bankroll" value="10000" placeholder="10000">
        </div>
        <div>
          <label style="font-size:0.75rem;color:var(--text2)">Kelly 分數 (Fraction)</label>
          <input type="number" class="input" id="kellyFraction" value="0.25" step="0.05" placeholder="0.25">
        </div>
      </div>
      <div id="kellyResults"></div>
    </div>
  </div>

  <!-- 積分榜區塊 -->
  <div class="section" id="standings">
    <div class="card">
      <div class="card-title"><span class="icon">📊</span>小組積分榜</div>
      <div id="standingsContent"></div>
    </div>
  </div>

  <!-- 預測區塊 -->

// ==================== 真實賠率獲取 ====================
async function fetchRealOdds() {
  const sport = document.getElementById('sportKeySelect').value;
  const regions = document.getElementById('regionSelect').value;
  const markets = document.getElementById('marketSelect').value;

  const loadingEl = document.getElementById('oddsLoading');
  const errorEl = document.getElementById('oddsError');
  const contentEl = document.getElementById('oddsContent');

  loadingEl.innerHTML = '<div class="loading">正在連接 The-Odds-API 獲取真實賠率...</div>';
  errorEl.innerHTML = '';
  contentEl.innerHTML = '';

  try {
    const url = `${CONFIG.ODDS_API_BASE}/sports/${sport}/odds?apiKey=${CONFIG.ODDS_API_KEY}&regions=${regions}&markets=${markets}&oddsFormat=decimal&dateFormat=iso`;

    const response = await fetch(url);
    const remaining = response.headers.get('x-requests-remaining');

    if(!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.message || `HTTP ${response.status}: ${response.statusText}`);
    }

    const data = await response.json();
    realOddsData = data || [];

    // 更新 API 狀態
    const statusEl = document.getElementById('apiStatus');
    const statusText = document.getElementById('apiStatusText');
    statusEl.className = 'api-status connected';
    statusText.textContent = `賠率API已連接 | 剩餘配額: ${remaining || 'N/A'} | 獲取 ${realOddsData.length} 場賽事`;

    loadingEl.innerHTML = '';
    renderOddsList();
    analyzeValueOpportunities();

  } catch(err) {
    loadingEl.innerHTML = '';
    errorEl.innerHTML = `<div class="error">
      <strong>⚠️ 賠率API連接失敗</strong><br>
      ${err.message}<br><br>
      <small>可能原因：<br>
      1. Sport Key 不正確（請嘗試其他選項）<br>
      2. API 配額已用完<br>
      3. 網絡連接問題<br>
      4. CORS 限制（瀏覽器安全策略）</small><br><br>
      <button class="btn btn-small" onclick="useDemoOdds()">使用演示賠率數據</button>
    </div>`;

    const statusEl = document.getElementById('apiStatus');
    const statusText = document.getElementById('apiStatusText');
    statusEl.className = 'api-status disconnected';
    statusText.textContent = '賠率API連接失敗';
  }
}

function generateDemoOdds() {
  const demo = [];
  const upcoming = MATCHES.filter(m => m.status === 'upcoming');

  upcoming.forEach(m => {
    const pred = MODEL_PREDICTIONS[m.id];
    if(!pred) return;

    // 根據模型概率生成合理賠率（加入博彩公司 margin）
    const margin = 1.08; // 8% margin
    const homeOdds = Math.max(1.1, (1 / (pred.home * margin)) + (Math.random() * 0.4 - 0.2));
    const drawOdds = Math.max(1.1, (1 / (pred.draw * margin)) + (Math.random() * 0.6 - 0.3));
    const awayOdds = Math.max(1.1, (1 / (pred.away * margin)) + (Math.random() * 0.4 - 0.2));

    const totalLine = pred.goals > 2.5 ? 2.5 : 2.0;
    const overOdds = pred.ou25 > 0.5 ? 1.85 + Math.random() * 0.3 : 2.0 + Math.random() * 0.4;
    const underOdds = pred.ou25 > 0.5 ? 1.95 + Math.random() * 0.3 : 1.8 + Math.random() * 0.3;

    demo.push({
      id: m.id,
      sport_key: 'soccer_fifa_world_cup',
      sport_title: 'FIFA World Cup 2026',
      commence_time: `2026-${m.date}T${m.time}:00Z`,
      home_team: m.home,
      away_team: m.away,
      bookmakers: [
        {
          key: 'bet365',
          title: 'Bet365',
          markets: [
            {key:'h2h',outcomes:[{name:m.home,price:homeOdds},{name:m.away,price:awayOdds},{name:'Draw',price:drawOdds}]},
            {key:'totals',outcomes:[{name:'Over',price:overOdds,point:totalLine},{name:'Under',price:underOdds,point:totalLine}]},
            {key:'btts',outcomes:[{name:'Yes',price:pred.btts > 0.5 ? 1.85 : 2.05},{name:'No',price:pred.btts > 0.5 ? 1.95 : 1.75}]}
          ]
        },
        {
          key: 'williamhill',
          title: 'William Hill',
          markets: [
            {key:'h2h',outcomes:[{name:m.home,price:homeOdds*0.98},{name:m.away,price:awayOdds*1.02},{name:'Draw',price:drawOdds*1.01}]},
            {key:'totals',outcomes:[{name:'Over',price:overOdds*0.97,point:totalLine},{name:'Under',price:underOdds*1.03,point:totalLine}]}
          ]
        },
        {
          key: 'pinnacle',
          title: 'Pinnacle',
          markets: [
            {key:'h2h',outcomes:[{name:m.home,price:homeOdds*1.03},{name:m.away,price:awayOdds*0.97},{name:'Draw',price:drawOdds*0.99}]},
            {key:'totals',outcomes:[{name:'Over',price:overOdds*1.02,point:totalLine},{name:'Under',price:underOdds*0.98,point:totalLine}]}
          ]
        }
      ]
    });
  });

  return demo;
}

function renderValueTags(match, modelPred) {
  const tags = [];
  const h2hMarket = getMarket(match, 'h2h');
  if(h2hMarket) {
    const homeOdds = h2hMarket.outcomes.find(o => o.name === match.home_team)?.price;
    const awayOdds = h2hMarket.outcomes.find(o => o.name === match.away_team)?.price;
    const drawOdds = h2hMarket.outcomes.find(o => o.name === 'Draw')?.price;

    if(homeOdds && modelPred.home) {
      const implied = 1/homeOdds;
      const edge = modelPred.home - implied;
      if(edge > 0.05) tags.push(`<span class="value-good">主勝 +${(edge*100).toFixed(1)}%</span>`);
      else if(edge > 0.02) tags.push(`<span class="value-fair">主勝 +${(edge*100).toFixed(1)}%</span>`);
    }
    if(awayOdds && modelPred.away) {
      const implied = 1/awayOdds;
      const edge = modelPred.away - implied;
      if(edge > 0.05) tags.push(`<span class="value-good">客勝 +${(edge*100).toFixed(1)}%</span>`);
      else if(edge > 0.02) tags.push(`<span class="value-fair">客勝 +${(edge*100).toFixed(1)}%</span>`);
    }
  }

  if(!tags.length) return '<span style="font-size:0.65rem;color:var(--text2)">暫無價值</span>';
  return tags.join('');
}

    if(h2h) {
      const homeOdds = getBestOdds(match, 'h2h', match.home_team)?.price;
      const awayOdds = getBestOdds(match, 'h2h', match.away_team)?.price;
      const drawOdds = getBestOdds(match, 'h2h', 'Draw')?.price;

      if(homeOdds && modelPred.home > 0) {
        const edge = modelPred.home * homeOdds - 1;
        const kelly = edge > 0 ? (edge / (homeOdds - 1)) * kellyFrac * 100 : 0;
        html += `<div class="kelly-row"><span>${match.home_team} 主勝 @${homeOdds.toFixed(2)}</span><span style="color:${kelly > 0 ? 'var(--green)' : 'var(--red)'}">${kelly > 0 ? `投注 ${(bankroll * kelly/100).toFixed(0)} (${kelly.toFixed(1)}%)` : '無價值'}</span></div>`;
      }
      if(awayOdds && modelPred.away > 0) {
        const edge = modelPred.away * awayOdds - 1;
        const kelly = edge > 0 ? (edge / (awayOdds - 1)) * kellyFrac * 100 : 0;
        html += `<div class="kelly-row"><span>${match.away_team} 客勝 @${awayOdds.toFixed(2)}</span><span style="color:${kelly > 0 ? 'var(--green)' : 'var(--red)'}">${kelly > 0 ? `投注 ${(bankroll * kelly/100).toFixed(0)} (${kelly.toFixed(1)}%)` : '無價值'}</span></div>`;
      }
      if(drawOdds && modelPred.draw > 0) {
        const edge = modelPred.draw * drawOdds - 1;
        const kelly = edge > 0 ? (edge / (drawOdds - 1)) * kellyFrac * 100 : 0;
        html += `<div class="kelly-row"><span>平局 @${drawOdds.toFixed(2)}</span><span style="color:${kelly > 0 ? 'var(--green)' : 'var(--red)'}">${kelly > 0 ? `投注 ${(bankroll * kelly/100).toFixed(0)} (${kelly.toFixed(1)}%)` : '無價值'}</span></div>`;
      }
    }
    html += '</div>';
  }

  detailContent.innerHTML = html;
  detailCard.scrollIntoView({behavior:'smooth'});
}

function renderH2hBox(label, odds, modelProb, type) {
  if(!odds) return '';
  const implied = 1/odds;
  const edge = modelProb - implied;
  const isValue = edge > 0.03;
  const width = Math.min(modelProb * 100, 100);

  return `<div class="h2h-box ${isValue ? 'highlight' : ''}">
    <div class="model-prob" style="width:${width}%"></div>
    <div class="label">${label}</div>
    <div class="odds">${odds.toFixed(2)}</div>
    <div class="implied-prob">隱含 ${(implied*100).toFixed(1)}% | 模型 ${(modelProb*100).toFixed(1)}%</div>
    <div class="prob-diff ${edge > 0 ? 'positive' : 'negative'}">${edge > 0 ? '+' : ''}${(edge*100).toFixed(1)}%</div>
    ${isValue ? '<span class="value-good">價值</span>' : ''}
  </div>`;
}

// ==================== 價值投注分析 ====================
function analyzeValueOpportunities() {
  valueOpportunities = [];

  realOddsData.forEach(match => {
    const modelPred = findModelPrediction(match.home_team, match.away_team);
    if(!modelPred) return;

    const h2h = getMarket(match, 'h2h');
    if(h2h) {
      h2h.outcomes.forEach(out => {
        const prob = out.name === match.home_team ? modelPred.home : out.name === match.away_team ? modelPred.away : modelPred.draw;
        const implied = 1/out.price;
        const edge = prob - implied;
        if(edge > 0.02) {
          valueOpportunities.push({
            match: `${match.home_team} vs ${match.away_team}`,
            matchId: match.id,
            type: '1X2',
            selection: out.name === 'Draw' ? '平局' : out.name,
            odds: out.price,
            modelProb: prob,
            impliedProb: implied,
            edge: edge,
            ev: (prob * out.price - 1) * 100,
            kelly: edge > 0 ? (edge / (out.price - 1)) : 0,
            confidence: modelPred.confidence
          });
        }
      });
    }

    const totals = getMarket(match, 'totals');
    if(totals && modelPred.goals) {
      const over = totals.outcomes.find(o => o.name === 'Over');
      const under = totals.outcomes.find(o => o.name === 'Under');
      if(over) {
        const implied = 1/over.price;
        const edge = modelPred.ou25 - implied;
        if(edge > 0.02) {
          valueOpportunities.push({
            match: `${match.home_team} vs ${match.away_team}`,
            matchId: match.id,
            type: '大小球',
            selection: `大 ${over.point || 2.5}`,
            odds: over.price,
            modelProb: modelPred.ou25,
            impliedProb: implied,
            edge: edge,
            ev: (modelPred.ou25 * over.price - 1) * 100,
            kelly: edge > 0 ? (edge / (over.price - 1)) : 0,
            confidence: modelPred.confidence
          });
        }
      }
      if(under) {
        const implied = 1/under.price;
        const edge = (1-modelPred.ou25) - implied;
        if(edge > 0.02) {
          valueOpportunities.push({
            match: `${match.home_team} vs ${match.away_team}`,
            matchId: match.id,
            type: '大小球',
            selection: `小 ${under.point || 2.5}`,
            odds: under.price,
            modelProb: 1-modelPred.ou25,
            impliedProb: implied,
            edge: edge,
            ev: ((1-modelPred.ou25) * under.price - 1) * 100,
            kelly: edge > 0 ? (edge / (under.price - 1)) : 0,
            confidence: modelPred.confidence
          });
        }
      }
    }

    const btts = getMarket(match, 'btts');
    if(btts && modelPred.btts) {
      const yes = btts.outcomes.find(o => o.name === 'Yes');
      const no = btts.outcomes.find(o => o.name === 'No');
      if(yes) {
        const implied = 1/yes.price;
        const edge = modelPred.btts - implied;
        if(edge > 0.02) {
          valueOpportunities.push({
            match: `${match.home_team} vs ${match.away_team}`,
            matchId: match.id,
            type: 'BTTS',
            selection: '是',
            odds: yes.price,
            modelProb: modelPred.btts,
            impliedProb: implied,
            edge: edge,
            ev: (modelPred.btts * yes.price - 1) * 100,
            kelly: edge > 0 ? (edge / (yes.price - 1)) : 0,
            confidence: modelPred.confidence
          });
        }
      }
      if(no) {
        const implied = 1/no.price;
        const edge = (1-modelPred.btts) - implied;
        if(edge > 0.02) {
          valueOpportunities.push({
            match: `${match.home_team} vs ${match.away_team}`,
            matchId: match.id,
            type: 'BTTS',
            selection: '否',
            odds: no.price,
            modelProb: 1-modelPred.btts,
            impliedProb: implied,
            edge: edge,
            ev: ((1-modelPred.btts) * no.price - 1) * 100,
            kelly: edge > 0 ? (edge / (no.price - 1)) : 0,
            confidence: modelPred.confidence
          });
        }
      }
    }
  });

  valueOpportunities.sort((a,b) => b.edge - a.edge);
}

function renderStandings() {
  let html = '';
  Object.entries(WC2026_GROUPS).forEach(([group, teams]) => {
    const standings = calculateGroupStandings(group, teams);
    html += `<div class="card" style="margin-bottom:12px">
      <div class="card-title">小組 ${group}</div>
      <table class="standings-table">
        <tr><th>#</th><th>球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>得</th><th>失</th><th>差</th><th>分</th></tr>
        ${standings.map((t,i) => `
          <tr class="${i < 2 ? 'qualified' : 'eliminated'}">
            <td>${i+1}</td>
            <td>${t.team}</td>
            <td>${t.p}</td>
            <td>${t.w}</td>
            <td>${t.d}</td>
            <td>${t.l}</td>
            <td>${t.gf}</td>
            <td>${t.ga}</td>
            <td>${t.gd}</td>
            <td style="font-weight:700;color:var(--accent)">${t.pts}</td>
          </tr>
        `).join('')}
      </table>
    </div>`;
  });

}

function calculateGroupStandings(group, teams) {
  const results = {};
  teams.forEach(t => results[t] = {team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});

  MATCHES.filter(m => m.group === group && m.status === 'completed').forEach(m => {
    const h = results[m.home], a = results[m.away];
    if(!h || !a) return;
    h.p++; a.p++;
    h.gf += m.homeScore; h.ga += m.awayScore;
    a.gf += m.awayScore; a.ga += m.homeScore;

    if(m.homeScore > m.awayScore) { h.w++; a.l++; h.pts += 3; }
    else if(m.homeScore < m.awayScore) { a.w++; h.l++; a.pts += 3; }
    else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
  });

  return Object.values(results).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

    else if(diff < -0.15) { handicap = '+0.25'; rec = m.away; }

    html += `<div class="match-row">

function saveResult(matchId) {
  const homeScore = parseInt(document.getElementById(`score_${matchId}_home`).value);
  const awayScore = parseInt(document.getElementById(`score_${matchId}_away`).value);
  if(isNaN(homeScore) || isNaN(awayScore)) return alert('請輸入有效比分');

  userResults[matchId] = {homeScore, awayScore, timestamp: new Date().toISOString()};
  localStorage.setItem('wc2026_results', JSON.stringify(userResults));

  // 更新賽事狀態
  const match = MATCHES.find(m => m.id === matchId);
  if(match) {
    match.status = 'completed';
    match.homeScore = homeScore;
    match.awayScore = awayScore;
  }

  renderMatches();
  renderStandings();
  alert('✅ 已保存並更新積分榜！');
}

function clearAllResults() {
  if(!confirm('確定要清除所有已輸入的賽果嗎？')) return;
  localStorage.removeItem('wc2026_results');
  userResults = {};
  location.reload();
}

    html += `<div class="grid-3" style="margin-top:8px">
      <div class="stat-box"><div class="stat-label">預期入球</div><div class="stat-value">${pred.goals.toFixed(2)}</div></div>
      <div class="stat-box"><div class="stat-label">角球</div><div class="stat-value">${pred.corners.toFixed(1)}</div></div>
      <div class="stat-box"><div class="stat-label">BTTS</div><div class="stat-value">${(pred.btts*100).toFixed(0)}%</div></div>
    </div>`;
    html += `<div style="margin-top:8px;font-size:0.75rem;color:var(--text2)">信心: ${pred.confidence} | 半場和局: ${(pred.htDraw*100).toFixed(0)}%</div>`;
    html += '</div>';

    // 滾球時間節點
    html += '<div class="prediction-detail"><h4>📡 滾球時間節點預警</h4>';
    html += `<div class="corner-stat"><span>30分鐘</span><span>入球機會: ${pred.fhGoals > 1 ? '高' : pred.fhGoals > 0.7 ? '中' : '低'} (${pred.fhGoals.toFixed(2)} 預期)</span></div>`;
    html += `<div class="corner-stat"><span>半場</span><span>和局概率: ${(pred.htDraw*100).toFixed(0)}% | 角球預期: ${(pred.corners*0.45).toFixed(1)}</span></div>`;
    html += `<div class="corner-stat"><span>60分鐘</span><span>下半場入球: ${pred.shGoals.toFixed(2)} 預期</span></div>`;
    html += `<div class="corner-stat"><span>75分鐘</span><span>最後階段壓力: ${pred.shGoals > 1.3 ? '高' : '中'}</span></div>`;
    html += '</div>';

    // 角球專項
    html += '<div class="prediction-detail"><h4>🚩 角球專項分析</h4>';
    html += `<div class="corner-stat"><span>總角球預期</span><span>${pred.corners.toFixed(1)} (盤口: ${Math.round(pred.corners)}.5)</span></div>`;
    html += `<div class="corner-stat"><span>${match.home} 角球</span><span>${pred.homeCorners} (預期控球圍攻型)</span></div>`;
    html += `<div class="corner-stat"><span>${match.away} 角球</span><span>${pred.awayCorners}</span></div>`;
    html += `<div class="corner-stat"><span>上半場角球</span><span>${(pred.corners*0.45).toFixed(1)}</span></div>`;
    html += '</div>';
  }

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('matchModal').classList.add('active');
}

function closeModal() {
  document.getElementById('matchModal').classList.remove('active');
}

// ==================== 工具函數 ====================
function getMarket(match, marketKey) {
  if(!match.bookmakers) return null;
  for(const bm of match.bookmakers) {
    const m = bm.markets.find(m => m.key === marketKey);
    if(m) return m;
  }
  return null;
}

function getBestOdds(match, marketKey, outcomeName) {
  let best = null;
  if(!match.bookmakers) return null;
  match.bookmakers.forEach(bm => {
    const m = bm.markets.find(m => m.key === marketKey);
    if(!m) return;
    const out = m.outcomes.find(o => o.name === outcomeName);
    if(out && (!best || out.price > best.price)) best = {price: out.price, bookmaker: bm.title};
  });
  return best;
}

function getAverageOdds(match, marketKey, outcomeName) {
  let sum = 0, count = 0;
  if(!match.bookmakers) return null;
  match.bookmakers.forEach(bm => {
    const m = bm.markets.find(m => m.key === marketKey);
    if(!m) return;
    const out = m.outcomes.find(o => o.name === outcomeName);
    if(out) { sum += out.price; count++; }
  });
  return count > 0 ? sum/count : null;
}

function countUniqueBookmakers() {
  const set = new Set();
  realOddsData.forEach(m => m.bookmakers?.forEach(b => set.add(b.key)));
  return set.size;
}

function findModelPrediction(home, away) {
  const match = MATCHES.find(m => m.home === home && m.away === away);
  return match ? MODEL_PREDICTIONS[match.id] : null;
}

function formatDateTime(iso) {
  if(!iso) return '-';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function refreshAllData() {
  renderMatches();
  renderStandings();
  renderPredictions();
  if(document.getElementById('odds').classList.contains('active')) fetchRealOdds();
  if(document.getElementById('value').classList.contains('active')) renderValueAnalysis();
}

// 點擊 modal 背景關閉
document.getElementById('matchModal').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

// 初始化
init();
</script>
