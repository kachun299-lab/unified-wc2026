function renderFormation(lineup, formation) {
  const rows = [];
  if (formation === "4-3-3") {
    rows.push(lineup.filter(p=>p.pos==="FW"));
    rows.push(lineup.filter(p=>p.pos==="MF"));
    rows.push(lineup.filter(p=>p.pos==="DF"));
    rows.push(lineup.filter(p=>p.pos==="GK"));
  } else if (formation === "4-2-3-1") {
    rows.push(lineup.filter(p=>p.pos==="FW"));
    rows.push(lineup.filter(p=>p.pos==="MF").slice(2,5));
    rows.push(lineup.filter(p=>p.pos==="MF").slice(0,2));
    rows.push(lineup.filter(p=>p.pos==="DF"));
    rows.push(lineup.filter(p=>p.pos==="GK"));
  } else if (formation === "4-4-2") {
    rows.push(lineup.filter(p=>p.pos==="FW"));
    rows.push(lineup.filter(p=>p.pos==="MF"));
    rows.push(lineup.filter(p=>p.pos==="DF"));
    rows.push(lineup.filter(p=>p.pos==="GK"));
  } else if (formation === "3-5-2") {
    const fw = lineup.filter(p=>p.pos==="FW");
    const mf = lineup.filter(p=>p.pos==="MF");
    const df = lineup.filter(p=>p.pos==="DF");
    const gk = lineup.filter(p=>p.pos==="GK");
    rows.push(fw);
    rows.push(mf.slice(1,4));
    rows.push([mf[0], ...mf.slice(4), df[0]]);
    rows.push(df.slice(1));
    rows.push(gk);
  }

  return rows.map((row, i) => `
    <div class="pos-row" style="margin-top:${i===0?0:16}px">
      ${row.map(p=>`
        <div class="player-dot">
          <div class="dot ${p.pos==='GK'?'gk':''}">${p.num}</div>
          <div class="player-name">${p.name}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderTeamList() {
  const container = document.getElementById('teamList');
  const order = ["bra","jpn","ger","ned","fra","arg","esp","por","mex","rsa","sui","can","bih","mar","usa","aus","par","civ","ecu","swe","bel","egy","cpv","nor","sen","aut","alg","col","cod","eng","cro","gha"];
  container.innerHTML = order.map(key => {
    const t = teamsData[key];
    return `
      <div class="team-card" id="card-${key}" onclick="toggleTeam('${key}')">
        <div class="team-header">
          <div class="team-info">
            <div class="team-flag">${t.flag}</div>
            <div>
              <span class="team-name">${t.name}</span>
              <span class="team-group">${t.group}</span>
            </div>
          </div>
          <div class="team-arrow">▶</div>
        </div>
        <div class="team-detail">
          <div class="detail-inner">
            <div class="formation-title">預計陣型：${t.formation}</div>
            <div class="pitch">
              ${renderFormation(t.lineup, t.formation)}
            </div>
            <div style="margin-top:12px;font-size:0.75rem;color:var(--text-secondary);">
              <b style="color:var(--accent)">關鍵替補：</b>${t.subs.join('、')}
            </div>
            <div class="stats-grid">
              <div class="stat-box"><div class="stat-value">${t.stats.atk}</div><div class="stat-label">進攻</div></div>
              <div class="stat-box"><div class="stat-value">${t.stats.mid}</div><div class="stat-label">中場</div></div>
              <div class="stat-box"><div class="stat-value">${t.stats.def}</div><div class="stat-label">防守</div></div>
              <div class="stat-box"><div class="stat-value">${t.stats.spd}</div><div class="stat-label">速度</div></div>
              <div class="stat-box"><div class="stat-value">${t.stats.tec}</div><div class="stat-label">技術</div></div>
              <div class="stat-box"><div class="stat-value">${t.stats.phy}</div><div class="stat-label">身體</div></div>
            </div>

}

function toggleTeam(key) {
  const card = document.getElementById('card-'+key);
  card.classList.toggle('expanded');
}

function initCompare() {
  const selA = document.getElementById('teamA');
  const selB = document.getElementById('teamB');
  const keys = Object.keys(teamsData);
  const opts = keys.map(k => `<option value="${k}">${teamsData[k].flag} ${teamsData[k].name}</option>`).join('');
  selA.innerHTML = opts;
  selB.innerHTML = opts;
  selB.value = keys[1];
}

let radarChart = null;

function runCompare() {
  const k1 = document.getElementById('teamA').value;
  const k2 = document.getElementById('teamB').value;
  const t1 = teamsData[k1];
  const t2 = teamsData[k2];
  const res = document.getElementById('compareResult');

  const atk1 = t1.stats.atk, def2 = t2.stats.def;
  const atk2 = t2.stats.atk, def1 = t1.stats.def;
  const mid1 = t1.stats.mid, mid2 = t2.stats.mid;

  const base1 = Math.max(0, (atk1 * 1.1 - def2 * 0.6 + mid1 * 0.3) / 18);
  const base2 = Math.max(0, (atk2 * 1.1 - def1 * 0.6 + mid2 * 0.3) / 18);

  let s1 = Math.round(base1 + (Math.random() * 1.2 - 0.4));
  let s2 = Math.round(base2 + (Math.random() * 1.2 - 0.4));
  if (s1 < 0) s1 = 0; if (s2 < 0) s2 = 0;
  if (s1 === 0 && s2 === 0) { s1 = 1; }

  const total = s1 + s2;
  const o25 = total >= 3 ? "大2.5" : "小2.5";
  const btts = s1 > 0 && s2 > 0 ? "雙方進球" : "單方進球";
  const win = s1 > s2 ? t1.name : s1 < s2 ? t2.name : "平局";

  res.innerHTML = `
    <div class="compare-result">
      <div class="score-display">
        <div class="score-team">
          <div class="flag">${t1.flag}</div>
          <div class="name">${t1.name}</div>
        </div>
        <div class="score-box">
          <span class="score-num">${s1}</span>
          <span class="score-sep">:</span>
          <span class="score-num">${s2}</span>
        </div>
        <div class="score-team">
          <div class="flag">${t2.flag}</div>
          <div class="name">${t2.name}</div>
        </div>
      </div>
      <div class="prediction-tags">
        <span class="pred-tag">預測勝者：${win}</span>
        <span class="pred-tag">${o25}</span>
        <span class="pred-tag">${btts}</span>
      </div>
      <div class="radar-wrap">
        <canvas id="radarChart"></canvas>
      </div>
      <div class="stats-compare">
        ${['atk','mid','def','spd','tec','phy'].map(stat => {
          const labels = {atk:'進攻',mid:'中場',def:'防守',spd:'速度',tec:'技術',phy:'身體'};
          const v1 = t1.stats[stat], v2 = t2.stats[stat];
          const max = Math.max(v1, v2, 95);
          return `
            <div class="compare-stat-row">
              <span class="compare-val val-team1">${v1}</span>
              <div class="bar-wrap">
                <div class="bar bar-team1" style="width:${(v1/max*100)}%;position:absolute;left:0;top:0;opacity:0.9"></div>
                <div class="bar bar-team2" style="width:${(v2/max*100)}%;position:absolute;right:0;top:0;opacity:0.9"></div>
              </div>
              <span class="compare-label">${labels[stat]}</span>
              <div class="bar-wrap" style="visibility:hidden;width:0"></div>
              <span class="compare-val val-team2">${v2}</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

  setTimeout(() => {
    const ctx = document.getElementById('radarChart').getContext('2d');
    if (radarChart) radarChart.destroy();
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['進攻','中場','防守','速度','技術','身體'],
        datasets: [
          { label: t1.name, data: [t1.stats.atk,t1.stats.mid,t1.stats.def,t1.stats.spd,t1.stats.tec,t1.stats.phy], borderColor: '#facc15', backgroundColor: 'rgba(250,204,21,0.2)', pointBackgroundColor: '#facc15' },
          { label: t2.name, data: [t2.stats.atk,t2.stats.mid,t2.stats.def,t2.stats.spd,t2.stats.tec,t2.stats.phy], borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.2)', pointBackgroundColor: '#3b82f6' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            min: 60, max: 100,
            ticks: { color: '#94a3b8', backdropColor: 'transparent', stepSize: 10 },
            grid: { color: 'rgba(255,255,255,0.1)' },
            angleLines: { color: 'rgba(255,255,255,0.1)' },
            pointLabels: { color: '#f8fafc', font: { size: 11 } }
          }
        },
        plugins: {
          legend: { labels: { color: '#f8fafc', font: { size: 12 } } }
        }
      }
    });
  }, 50);
}

function switchTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

renderTeamList();
initCompare();
</script>
