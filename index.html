<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界盃預測中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft JhengHei',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;padding-bottom:60px}
.header{background:linear-gradient(135deg,#00d4aa,#00b894);padding:12px 15px;position:sticky;top:0;z-index:1000}
.logo{display:flex;align-items:center;gap:8px}
.logo-text{font-size:18px;font-weight:900;color:white}
.logo-sub{font-size:9px;color:rgba(255,255,255,0.8)}
.nav-container{background:#111827;border-bottom:1px solid #1e293b;position:sticky;top:52px;z-index:999;overflow-x:auto}
.nav{display:flex;gap:3px;padding:8px 12px;min-width:max-content}
.nav-btn{padding:8px 14px;border:none;background:transparent;color:#94a3b8;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;white-space:nowrap;font-family:inherit}
.nav-btn.active{background:linear-gradient(135deg,#00d4aa,#00b894);color:white}
.main-content{max-width:1200px;margin:0 auto;padding:15px 12px}
.section{display:none}
.section.active{display:block}
.card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:16px;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:16px;font-weight:700}
.match-card{background:#1a2332;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #1e293b;cursor:pointer}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.match-league{font-size:11px;color:#00d4aa;font-weight:600}
.match-time{font-size:12px;color:#94a3b8}
.match-teams{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.team{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.team-name{font-size:14px;font-weight:700}
.team-flag{font-size:28px}
.vs-center{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 10px}
.vs-score{font-size:20px;font-weight:900;color:#00d4aa}
.match-odds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.odds-box{background:#0a0e1a;border-radius:10px;padding:8px;text-align:center;border:1px solid #1e293b}
.odds-value{font-size:15px;font-weight:700}
.odds-prob{font-size:10px;color:#00d4aa;font-weight:600}
.pred-bar{height:4px;background:#0a0e1a;border-radius:2px;margin-top:6px;overflow:hidden}
.pred-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#00d4aa,#00b894)}
.tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-green{background:rgba(34,197,94,0.2);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.tag-yellow{background:rgba(245,158,11,0.2);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.tag-red{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.gtable{width:100%;border-collapse:collapse;font-size:12px}
.gtable th{background:#0a0e1a;padding:8px 6px;font-size:11px;color:#94a3b8;text-align:center;font-weight:600}
.gtable td{padding:10px 6px;text-align:center;border-bottom:1px solid #1e293b}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111827;border-top:1px solid #1e293b;display:flex;justify-content:space-around;padding:6px 0;z-index:1000}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;color:#94a3b8;font-size:10px;cursor:pointer;border:none;background:none;font-family:inherit}
.bn-item.on{color:#00d4aa}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;border:1px solid #1e293b;background:#0a0e1a;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit}
.tab.on{background:#00d4aa;color:white;border-color:#00d4aa}
</style>
</head>
<body>
<header class="header">
<div class="logo">
<div class="logo-text">世界盃預測中心</div>
<div class="logo-sub">ULTRA+ v5.1 | 2026 美加墨</div>
</div>
</header>
<div class="nav-container">
<nav class="nav" id="topNav">
<button class="nav-btn active" data-sec="today">今日賽事</button>
<button class="nav-btn" data-sec="schedule">完整賽程</button>
<button class="nav-btn" data-sec="standings">積分榜</button>
<button class="nav-btn" data-sec="live">滾球監控</button>
<button class="nav-btn" data-sec="value">價值投注</button>
<button class="nav-btn" data-sec="ml">ML模型</button>
<button class="nav-btn" data-sec="odds">賠率對比</button>
<button class="nav-btn" data-sec="analysis">深度分析</button>
</nav>
</div>
<main class="main-content" id="mainContent">
<section class="section active" id="todaySection">
<div class="card">
<div class="card-header">
<div class="card-title">📅 6月24日 賽事預測</div>
<span style="padding:3px 10px;border-radius:20px;font-size:11px;background:rgba(59,130,246,0.2);color:#3b82f6;border:1px solid rgba(59,130,246,0.3)">API 實時</span>
</div>
<div id="todayMatches"></div>
</div>
<div class="card">
<div class="card-header">
<div class="card-title">⚡ 今日焦點</div>
<span style="padding:3px 10px;border-radius:20px;font-size:11px;background:rgba(139,92,246,0.2);color:#a78bfa;border:1px solid rgba(139,92,246,0.3)">ML 增強</span>
</div>
<div id="todayHighlights"></div>
</div>
</section>
<section class="section" id="scheduleSection">
<div class="card">
<div class="card-title">📋 完整賽程</div>
<div class="tabs" id="schedTabs"></div>
<div id="schedContent"></div>
</div>
</section>
<section class="section" id="standingsSection">
<div class="card">
<div class="card-title">📊 小組積分榜</div>
<div class="tabs" id="standTabs"></div>
<div id="standContent"></div>
</div>
</section>
<section class="section" id="liveSection">
<div class="card">
<div class="card-title">🔴 滾球實時</div>
<div id="liveMatches"></div>
</div>
</section>
<section class="section" id="valueSection">
<div class="card">
<div class="card-title">💎 價值投注</div>
<div id="valueBets"></div>
</div>
</section>
<section class="section" id="mlSection">
<div class="card">
<div class="card-title">🧠 ML 預測模型</div>
<div id="mlWeights"></div>
</div>
</section>
<section class="section" id="oddsSection">
<div class="card">
<div class="card-title">⚖️ 實時賠率對比</div>
<div id="oddsComp"></div>
</div>
</section>
<section class="section" id="analysisSection">
<div class="card">
<div class="card-title">🎯 角球專項分析</div>
<div id="cornerAnalysis"></div>
</div>
</section>
</main>
<nav class="bottom-nav">
<button class="bn-item on" data-sec="today">🏠<span>首頁</span></button>
<button class="bn-item" data-sec="schedule">📅<span>賽程</span></button>
<button class="bn-item" data-sec="live">🔴<span>滾球</span></button>
<button class="bn-item" data-sec="value">💎<span>價值</span></button>
<button class="bn-item" data-sec="ml">🧠<span>ML</span></button>
</nav>
<script>
const teams={'葡萄牙':{f:'🇵🇹',e:1870},'烏茲別克':{f:'🇺🇿',e:1630},'英格蘭':{f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',e:1900},'迦納':{f:'🇬🇭',e:1690},'巴拿馬':{f:'🇵🇦',e:1560},'克羅地亞':{f:'🇭🇷',e:1820},'哥倫比亞':{f:'🇨🇴',e:1800},'剛果民主':{f:'🇨🇩',e:1650},'瑞士':{f:'🇨🇭',e:1800},'加拿大':{f:'🇨🇦',e:1750},'波黑':{f:'🇧🇦',e:1680},'卡塔爾':{f:'🇶🇦',e:1620},'蘇格蘭':{f:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',e:1700},'巴西':{f:'🇧🇷',e:1920},'摩洛哥':{f:'🇲🇦',e:1820},'海地':{f:'🇭🇹',e:1550},'捷克':{f:'🇨🇿',e:1720},'墨西哥':{f:'🇲🇽',e:1850},'南非':{f:'🇿🇦',e:1650},'韓國':{f:'🇰🇷',e:1780},'庫拉索':{f:'🇨🇼',e:1580},'科特迪瓦':{f:'🇨🇮',e:1710},'厄瓜多爾':{f:'🇪🇨',e:1690},'德國':{f:'🇩🇪',e:1880},'日本':{f:'🇯🇵',e:1770},'瑞典':{f:'🇸🇪',e:1750},'突尼斯':{f:'🇹🇳',e:1660},'荷蘭':{f:'🇳🇱',e:1890},'土耳其':{f:'🇹🇷',e:1730},'美國':{f:'🇺🇸',e:1830},'巴拉圭':{f:'🇵🇾',e:1740},'澳洲':{f:'🇦🇺',e:1760},'挪威':{f:'🇳🇴',e:1790},'法國':{f:'🇫🇷',e:1940},'塞內加爾':{f:'🇸🇳',e:1730},'伊拉克':{f:'🇮🇶',e:1610},'佛得角':{f:'🇨🇻',e:1600},'沙特':{f:'🇸🇦',e:1640},'烏拉圭':{f:'🇺🇾',e:1810},'西班牙':{f:'🇪🇸',e:1910},'埃及':{f:'🇪🇬',e:1720},'伊朗':{f:'🇮🇷',e:1700},'新西蘭':{f:'🇳🇿',e:1590},'比利時':{f:'🇧🇪',e:1840},'阿根廷':{f:'🇦🇷',e:1950},'奧地利':{f:'🇦🇹',e:1760},'阿爾及利亞':{f:'🇩🇿',e:1680},'約旦':{f:'🇯🇴',e:1570}};
const matches=[{id:1,d:'2026-06-24',t:'01:00',g:'K',h:'葡萄牙',a:'烏茲別克'},{id:2,d:'2026-06-24',t:'04:00',g:'L',h:'英格蘭',a:'迦納'},{id:3,d:'2026-06-24',t:'07:00',g:'L',h:'巴拿馬',a:'克羅地亞'},{id:4,d:'2026-06-24',t:'10:00',g:'K',h:'哥倫比亞',a:'剛果民主'}];
const gs={'A':[{t:'墨西哥',p:2,w:2,d:0,l:0,gf:3,ga:0,gd:3,pt:6},{t:'韓國',p:2,w:1,d:0,l:1,gf:2,ga:2,gd:0,pt:3},{t:'捷克',p:2,w:0,d:1,l:1,gf:2,ga:3,gd:-1,pt:1},{t:'南非',p:2,w:0,d:1,l:1,gf:1,ga:3,gd:-2,pt:1}]};
function calc(h,a){const ed=teams[h].e-teams[a].e;const hw=1/(1+Math.pow(10,-(ed+65)/400));const aw=1/(1+Math.pow(10,(ed+65)/400));const dr=Math.max(0.15,0.25-Math.abs(ed)/2000);const t=hw+aw+dr;return{hw:hw/t,dr:dr/t,aw:aw/t,tg:2.8+(ed/1000),c:9.5+(ed/200),conf:Math.min(95,50+Math.abs(ed)/40)}}
function fp(p){return(p*100).toFixed(1)+'%'}
function fo(p){return(1/p).toFixed(2)}
function rCard(m){const p=calc(m.h,m.a);const th=teams[m.h];const ta=teams[m.a];const mp=Math.max(p.hw,p.dr,p.aw);const res=p.hw===mp?'主勝':p.dr===mp?'和':'客勝';const rc=p.hw===mp?'tag-green':p.dr===mp?'tag-yellow':'tag-red';return`<div class="match-card"><div class="match-top"><div class="match-league">${m.g}組 | ${m.t}</div><div class="match-time">${m.d.split('-')[1]}/${m.d.split('-')[2]}</div></div><div class="match-teams"><div class="team"><div class="team-flag">${th.f}</div><div class="team-name">${m.h}</div></div><div class="vs-center"><div class="vs-score">${p.tg.toFixed(1)}</div><div style="font-size:10px;color:#94a3b8">預期入球</div></div><div class="team"><div class="team-flag">${ta.f}</div><div class="team-name">${m.a}</div></div></div><div class="match-odds"><div class="odds-box"><div class="odds-value">${fo(p.hw)}</div><div class="odds-prob">${fp(p.hw)}</div></div><div class="odds-box"><div class="odds-value">${fo(p.dr)}</div><div class="odds-prob">${fp(p.dr)}</div></div><div class="odds-box"><div class="odds-value">${fo(p.aw)}</div><div class="odds-prob">${fp(p.aw)}</div></div></div><div class="pred-bar"><div class="pred-fill" style="width:${p.conf}%"></div></div><div class="tags"><span class="tag ${rc}">${res} ${fp(mp)}</span><span class="tag" style="background:rgba(255,217,61,0.2);color:#ffd93b;border:1px solid rgba(255,217,61,0.3)">入球${p.tg.toFixed(1)}</span><span class="tag" style="background:rgba(255,107,107,0.2);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3)">角球${p.c.toFixed(1)}</span></div></div>`}
function rToday(){document.getElementById('todayMatches').innerHTML=matches.map(m=>rCard(m)).join('')}
function rHigh(){document.getElementById('todayHighlights').innerHTML=matches.slice(0,3).map(m=>{const p=calc(m.h,m.a);return`<div style="background:#0a0e1a;border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid #1e293b;position:relative;overflow:hidden"><div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(135deg,#ffd93d,#ff9f43)"></div><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:700">${m.h} vs ${m.a}</div><div style="font-size:16px;font-weight:900;color:#ffd93d">${fo(Math.max(p.hw,p.dr,p.aw))}</div></div><div style="display:flex;gap:12px;font-size:11px;color:#94a3b8"><div>推薦: <span style="color:#e2e8f0;font-weight:600">${p.hw>Math.max(p.dr,p.aw)?m.h+' 勝':p.dr>Math.max(p.hw,p.aw)?'和局':m.a+' 勝'}</span></div><div>入球: <span style="color:#e2e8f0">${p.tg.toFixed(1)}</span></div></div><div style="display:inline-block;background:rgba(255,217,61,0.15);color:#ffd93d;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-top:6px">信心 ${p.conf.toFixed(0)}%</div></div>`}).join('')}
function rSched(){const grps=['A','B','C','D','E','F','G','H','I','J','K','L'];document.getElementById('schedTabs').innerHTML=grps.map(g=>`<button class="tab ${g==='A'?'on':''}" onclick="filtSched('${g}')">${g}組</button>`).join('');filtSched('A')}
function filtSched(g){document.querySelectorAll('#schedTabs .tab').forEach(b=>b.classList.remove('on'));event.target.classList.add('on');document.getElementById('schedContent').innerHTML=`<div style="text-align:center;padding:30px;color:#94a3b8">暫時只顯示 6月24日 賽事<br>其他日期賽程即將更新</div>`}
function rStand(){const grps=['A','B','C','D','E','F','G','H','I','J','K','L'];document.getElementById('standTabs').innerHTML=grps.map(g=>`<button class="tab ${g==='A'?'on':''}" onclick="filtStand('${g}')">${g}組</button>`).join('');filtStand('A')}
function filtStand(g){document.querySelectorAll('#standTabs .tab').forEach(b=>b.classList.remove('on'));event.target.classList.add('on');const data=gs[g]||gs['A'];document.getElementById('standContent').innerHTML=`<table class="gtable"><thead><tr><th>排名</th><th>球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>得</th><th>失</th><th>差</th><th>分</th></tr></thead><tbody>${data.map((t,i)=>`<tr><td style="color:${i<2?'#22c55e':'#94a3b8'};font-weight:700">${i+1}</td><td style="text-align:left">${teams[t.t]?.f||''} ${t.t}</td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>0?'+'+t.gd:t.gd}</td><td><b>${t.pt}</b></td></tr>`).join('')}</tbody></table>`}
function showSec(sec){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('on'));document.getElementById(sec+'Section').classList.add('active');document.querySelectorAll(`[data-sec="${sec}"]`).forEach(b=>{b.classList.add('active');b.classList.add('on')})}
document.querySelectorAll('.nav-btn, .bn-item').forEach(btn=>{btn.addEventListener('click',function(){showSec(this.dataset.sec)})})
function init(){rToday();rHigh();rSched();rStand();}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
