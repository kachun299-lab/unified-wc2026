<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNIFIED WC2026 預測中心 v3.3.61 | 每日分段賽事版</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--accent:#00d4ff;--accent2:#ff6b35;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e5e7eb;--text2:#9ca3af;--border:#1f2937}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden}
.container{max-width:100%;padding:0}
.header{text-align:center;padding:16px 12px;border-bottom:2px solid var(--accent);position:sticky;top:0;background:var(--bg);z-index:100}
.header h1{font-size:1.3rem;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .version{color:var(--text2);font-size:0.75rem;margin-top:4px}
.api-status{display:inline-flex;align-items:center;gap:6px;font-size:0.7rem;padding:4px 10px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-top:8px}
.api-status.connected{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:var(--green)}
.api-status.disconnected{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red)}
.api-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.nav{display:flex;gap:8px;overflow-x:auto;padding:12px;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:70px;z-index:99}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.78rem;cursor:pointer;transition:all .2s}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;font-weight:600}
.section{display:none;padding:12px}
.section.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* 日期分段 */
.date-section{margin-bottom:16px}
.date-header{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;border-left:4px solid var(--accent);border:1px solid var(--border);border-left-width:4px}
.date-header .date-text{font-size:1rem;font-weight:700;color:var(--accent)}
.date-header .match-count{font-size:0.7rem;color:var(--text2);background:rgba(0,212,255,0.1);padding:4px 10px;border-radius:12px}

/* 賽事卡片 */
.match-card{background:var(--card);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);overflow:hidden}
.match-card.completed{border-left:3px solid var(--green)}
.match-card.upcoming{border-left:3px solid var(--yellow)}
.match-card.live{border-left:3px solid var(--red);animation:pulse-border 2s infinite}
@keyframes pulse-border{0%,100%{border-left-color:var(--red)}50%{border-left-color:#ff4444}}
.match-main{padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.match-time-section{text-align:center;min-width:52px}
.match-time-section .time{font-size:0.95rem;font-weight:700;color:var(--text)}
.match-time-section .period{font-size:0.65rem;color:var(--text2);margin-top:2px}
.match-teams{flex:1}
.team-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.team-row .flag{font-size:1.3rem}
.team-row .name{font-size:0.9rem;font-weight:600}
.team-row .score{font-size:1.1rem;font-weight:700;color:var(--accent);margin-left:auto;min-width:24px;text-align:center}
.vs-divider{text-align:center;font-size:0.7rem;color:var(--text2);padding:2px 0}
.match-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.meta-tag{font-size:0.65rem;padding:3px 8px;border-radius:8px;background:rgba(0,212,255,0.08);color:var(--accent);font-weight:500;border:1px solid rgba(0,212,255,0.15)}
.meta-tag.green{background:rgba(16,185,129,0.08);color:var(--green);border-color:rgba(16,185,129,0.15)}
.meta-tag.yellow{background:rgba(245,158,11,0.08);color:var(--yellow);border-color:rgba(245,158,11,0.15)}
.match-expand{padding:0 14px 14px;display:none}
.match-expand.open{display:block}
.expand-btn{width:100%;padding:8px;border:none;background:transparent;color:var(--text2);font-size:0.75rem;cursor:pointer;border-top:1px solid var(--border)}

/* 預測 */
.pred-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pred-box{text-align:center;padding:10px;background:rgba(0,212,255,0.03);border-radius:8px;border:1px solid rgba(0,212,255,0.08)}
.pred-box .label{font-size:0.65rem;color:var(--text2);margin-bottom:4px}
.pred-box .value{font-size:1rem;font-weight:700;color:var(--accent)}
.pred-box .value.green{color:var(--green)}
.pred-box .value.red{color:var(--red)}

/* 通用 */
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:0.95rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;margin-top:10px}
.select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem;margin-bottom:10px}
.input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem;margin-bottom:8px}
.loading{text-align:center;padding:20px;color:var(--text2);font-size:0.85rem}
.loading::after{content:"";display:inline-block;width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:12px;border-radius:8px;font-size:0.8rem;margin-bottom:10px}
.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--green);padding:12px;border-radius:8px;font-size:0.8rem;margin-bottom:10px}
.tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:0.8rem;cursor:pointer;font-weight:500;white-space:nowrap}
.tab-btn.active{background:rgba(0,212,255,0.1);color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.standings-table{width:100%;font-size:0.75rem;border-collapse:collapse}
.standings-table th{text-align:left;padding:6px;color:var(--text2);border-bottom:1px solid var(--border);font-weight:600}
.standings-table td{padding:6px;border-bottom:1px solid var(--border)}
.standings-table tr.qualified td:first-child{border-left:3px solid var(--green)}
.standings-table tr.eliminated td:first-child{border-left:3px solid var(--red)}
.score-input{display:flex;align-items:center;gap:8px;justify-content:center;margin:8px 0}
.score-input input{width:50px;text-align:center;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;font-weight:700}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal.active{display:flex}
.modal-content{background:var(--card);border-radius:16px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
.modal-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:10;border-radius:16px 16px 0 0}
.modal-header h3{font-size:1rem}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px}
.scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:1.2rem;cursor:pointer;z-index:99;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,212,255,0.3)}
.refresh-btn{position:fixed;top:12px;right:12px;z-index:101;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem}
.filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.75rem;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.alert-box{padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:0.8rem;display:flex;align-items:center;gap:8px}
.alert-box.info{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);color:var(--accent)}
.alert-box.warning{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:var(--yellow)}
.kelly-calc{padding:12px;background:rgba(0,212,255,0.03);border-radius:8px;margin-top:10px;border:1px solid rgba(0,212,255,0.1)}
.kelly-calc h5{font-size:0.8rem;color:var(--accent);margin-bottom:8px}
.kelly-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.75rem;border-bottom:1px solid var(--border)}
.kelly-row:last-child{border-bottom:none;font-weight:700;color:var(--accent)}
.stage-badge{font-size:0.6rem;padding:2px 6px;border-radius:4px;background:var(--accent);color:#fff;font-weight:700;margin-left:6px;vertical-align:middle}
.stage-badge.ko{background:var(--red)}
.odds-bar{display:flex;gap:6px;margin-top:8px;align-items:center}
.odds-bar .odds-item{flex:1;text-align:center;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border)}
.odds-bar .odds-item .bookie{font-size:0.6rem;color:var(--text2);margin-bottom:4px}
.odds-bar .odds-item .price{font-size:1.1rem;font-weight:700;color:var(--text)}
.odds-bar .odds-item .price.best{color:var(--green)}
.odds-bar .odds-item .implied{font-size:0.6rem;color:var(--text2);margin-top:2px}
.value-tag{display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;padding:3px 8px;border-radius:6px;font-weight:600;margin-top:4px}
.value-tag.positive{background:rgba(16,185,129,0.15);color:var(--green)}
.value-tag.negative{background:rgba(239,68,68,0.15);color:var(--red)}
.value-tag.neutral{background:rgba(156,163,175,0.15);color:var(--text2)}
</style>
<base target="_blank">
</head>
<body>
<div class="container">
  <button class="refresh-btn" onclick="refreshAllData()" title="刷新">⟳</button>
  <div class="header">
    <h1>🏆 UNIFIED WC2026 預測中心</h1>
    <div class="version">v3.3.61 | 每日分段賽事版 | 真實賠率分析</div>
    <div class="api-status disconnected" id="apiStatus">
      <span class="dot"></span>
      <span id="apiStatusText">賠率API未連接</span>
    </div>
  </div>

  <div class="nav" id="mainNav">
    <button class="nav-btn active" onclick="showSection('matches')">📅 每日賽事</button>
    <button class="nav-btn" onclick="showSection('odds')">💰 真實賠率</button>
    <button class="nav-btn" onclick="showSection('value')">🎯 價值投注</button>
    <button class="nav-btn" onclick="showSection('standings')">📊 積分榜</button>
    <button class="nav-btn" onclick="showSection('predictions')">🔮 預測</button>
    <button class="nav-btn" onclick="showSection('live')">📡 滾球</button>
    <button class="nav-btn" onclick="showSection('corners')">🚩 角球</button>
    <button class="nav-btn" onclick="showSection('input')">📝 數據</button>
  </div>

  <!-- 每日賽事 -->
  <div class="section active" id="matches">
    <div class="filter-row" id="matchFilter">
      <button class="filter-btn active" onclick="filterMatches('all')">全部</button>
      <button class="filter-btn" onclick="filterMatches('upcoming')">未開始</button>
      <button class="filter-btn" onclick="filterMatches('completed')">已完賽</button>
      <button class="filter-btn" onclick="filterMatches('ko')">淘汰賽</button>
    </div>
    <div id="matchesList"></div>
  </div>

  <!-- 真實賠率 -->
  <div class="section" id="odds">
    <div class="card">
      <div class="card-title"><span>💰</span>真實賠率監控</div>
      <div class="alert-box info"><span>ℹ️</span><span>連接 The-Odds-API 獲取實時賠率</span></div>
      <select class="select" id="sportKeySelect">
        <option value="soccer_fifa_world_cup">FIFA World Cup 2026</option>
        <option value="upcoming">全部即將開始</option>
      </select>
      <div style="display:flex;gap:8px">
        <select class="select" id="regionSelect" style="flex:1">
          <option value="uk,eu">UK + EU</option>
          <option value="uk">UK</option>
          <option value="eu">EU</option>
          <option value="us">US</option>
        </select>
        <select class="select" id="marketSelect" style="flex:1">
          <option value="h2h,totals,btts">1X2 + 大小球 + BTTS</option>
          <option value="h2h">1X2</option>
          <option value="h2h,totals">1X2 + 大小球</option>
        </select>
      </div>
      <button class="btn" onclick="fetchRealOdds()">🔄 獲取真實賠率</button>
      <div id="oddsLoading"></div>
      <div id="oddsError"></div>
      <div id="oddsContent"></div>
    </div>
    <div class="card" id="oddsDetailCard" style="display:none">
      <div class="card-title"><span>📊</span>賠率詳情 & 模型對比</div>
      <div id="oddsDetailContent"></div>
    </div>
  </div>

  <!-- 價值投注 -->
  <div class="section" id="value">
    <div class="card">
      <div class="card-title"><span>🎯</span>價值投注分析</div>
      <div class="alert-box warning"><span>⚠️</span><span>價值投注 = 模型預測概率 > 賠率隱含概率。僅供參考。</span></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="showValueTab('all')">全部</button>
        <button class="tab-btn" onclick="showValueTab('h2h')">1X2</button>
        <button class="tab-btn" onclick="showValueTab('totals')">大小球</button>
        <button class="tab-btn" onclick="showValueTab('btts')">BTTS</button>
      </div>
      <div class="tab-content active" id="valueTab-all"><div id="valueAllContent"></div></div>
      <div class="tab-content" id="valueTab-h2h"><div id="valueH2hContent"></div></div>
      <div class="tab-content" id="valueTab-totals"><div id="valueTotalsContent"></div></div>
      <div class="tab-content" id="valueTab-btts"><div id="valueBttsContent"></div></div>
    </div>
    <div class="card">
      <div class="card-title"><span>📈</span>Kelly 資金管理</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-size:0.75rem;color:var(--text2)">資金總額</label><input type="number" class="input" id="bankroll" value="10000"></div>
        <div><label style="font-size:0.75rem;color:var(--text2)">Kelly 分數</label><input type="number" class="input" id="kellyFraction" value="0.25" step="0.05"></div>
      </div>
      <div id="kellyResults"></div>
    </div>
  </div>

  <!-- 積分榜 -->
  <div class="section" id="standings">
    <div id="standingsContent"></div>
  </div>

  <!-- 預測 -->
  <div class="section" id="predictions">
    <div class="card">
      <div class="card-title"><span>🔮</span>賽事預測分析</div>
      <div id="predictionsList"></div>
    </div>
  </div>

  <!-- 滾球 -->
  <div class="section" id="live">
    <div class="card">
      <div class="card-title"><span>📡</span>滾球實時監控</div>
      <div id="liveContent"></div>
    </div>
  </div>

  <!-- 角球 -->
  <div class="section" id="corners">
    <div class="card">
      <div class="card-title"><span>🚩</span>角球專項分析</div>
      <div id="cornersContent"></div>
    </div>
  </div>

  <!-- 數據輸入 -->
  <div class="section" id="input">
    <div class="card">
      <div class="card-title"><span>📝</span>輸入賽事數據</div>
      <div id="inputContent"></div>
    </div>
  </div>
</div>

<div class="modal" id="matchModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">賽事詳情</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const CONFIG = {

const MATCHES = [
  // ===== R1 =====

  {id:'r1_2',date:'06-12',time:'07:00',home:'韓國',away:'捷克',group:'A',stage:'group',status:'completed',homeScore:1,awayScore:2,homeFlag:'🇰🇷',awayFlag:'🇨🇿'},
  {id:'r1_3',date:'06-12',time:'10:00',home:'卡塔爾',away:'波黑',group:'B',stage:'group',status:'completed',homeScore:0,awayScore:1,homeFlag:'🇶🇦',awayFlag:'🇧🇦'},
  {id:'r1_4',date:'06-13',time:'04:00',home:'加拿大',away:'瑞士',group:'B',stage:'group',status:'completed',homeScore:2,awayScore:1,homeFlag:'🇨🇦',awayFlag:'🇨🇭'},

function showSection(id) {

}

function showValueTab(type) {

function filterMatches(type) {

function renderMatchesByDate() {
  const container = document.getElementById('matchesList');
  const byDate = {};
  MATCHES.forEach(m => {
    if(currentMatchFilter === 'upcoming' && m.status !== 'upcoming') return;
    if(currentMatchFilter === 'completed' && m.status !== 'completed') return;
    if(currentMatchFilter === 'ko' && !m.stage.startsWith('ko')) return;
    if(!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });
  const sortedDates = Object.keys(byDate).sort();
  let html = '';
  sortedDates.forEach(date => {
    const matches = byDate[date];
    const weekday = WEEKDAY_MAP[date] || '';
    const completedCount = matches.filter(m => m.status === 'completed').length;
    const totalCount = matches.length;
    const statusText = completedCount === totalCount ? '全部完賽' : completedCount > 0 ? `${completedCount}/${totalCount} 完賽` : `${totalCount} 場賽事`;
    html += `<div class="date-section">
      <div class="date-header">
        <div><div class="date-text">2026年${date.replace('-','月')}日 ${weekday}</div></div>
        <div class="match-count">${statusText}</div>
      </div>`;
    matches.forEach(m => {
      const pred = MODEL_PREDICTIONS[m.id];
      const isKO = m.stage.startsWith('ko');
      const cardClass = m.status === 'completed' ? 'completed' : m.status === 'live' ? 'live' : 'upcoming';
      html += `<div class="match-card ${cardClass}" id="match-${m.id}">
        <div class="match-main" onclick="toggleMatchDetail('${m.id}')">
          <div class="match-time-section">
            <div class="time">${m.time}</div>
            <div class="period">${isKO ? '<span style="color:var(--red);font-weight:700">' + m.koRound + '</span>' : (m.status === 'completed' ? '<span style="color:var(--green)">已完賽</span>' : '未開始')}</div>
          </div>
          <div class="match-teams">
            <div class="team-row">
              <span class="flag">${m.homeFlag}</span>
              <span class="name">${m.home}</span>
              ${m.status === 'completed' ? `<span class="score">${m.homeScore}</span>` : ''}
            </div>
            <div class="vs-divider">vs ${m.group ? '小組' + m.group : ''} ${m.note ? '· ' + m.note : ''}</div>
            <div class="team-row">
              <span class="flag">${m.awayFlag}</span>
              <span class="name">${m.away}</span>
              ${m.status === 'completed' ? `<span class="score">${m.awayScore}</span>` : ''}
            </div>
            ${pred ? `<div class="match-meta">
              <span class="meta-tag">入球 ${pred.goals.toFixed(2)}</span>
              <span class="meta-tag">角球 ${pred.corners.toFixed(1)}</span>
              <span class="meta-tag ${pred.btts > 0.55 ? 'green' : ''}">BTTS ${Math.round(pred.btts*100)}%</span>
              <span class="meta-tag yellow">信心 ${pred.confidence}</span>
            </div>` : ''}
          </div>
        </div>
        <div class="match-expand" id="expand-${m.id}">
          ${pred ? renderMatchPrediction(m, pred) : '<div style="padding:10px;color:var(--text2);font-size:0.8rem;text-align:center">暫無預測數據</div>'}

        ${pred ? `<button class="expand-btn" onclick="toggleMatchDetail('${m.id}')">▼ 查看詳細預測</button>` : ''}

function renderStandings() {
  let html = '';
  Object.entries(WC2026_GROUPS).forEach(([group, teams]) => {
    const standings = calculateGroupStandings(group, teams);
    html += `<div class="card" style="margin-bottom:12px">
      <div class="card-title">小組 ${group}</div>
      <table class="standings-table">
        <tr><th>#</th><th>球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>得</th><th>失</th><th>差</th><th>分</th></tr>
        ${standings.map((t,i) => `
          <tr class="${i < 2 ? 'qualified' : 'eliminated'}">
            <td>${i+1}</td><td>${t.team}</td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gd}</td><td style="font-weight:700;color:var(--accent)">${t.pts}</td>
          </tr>
        `).join('')}
      </table>
    </div>`;
  });
  document.getElementById('standingsContent').innerHTML = html;
}

function calculateGroupStandings(group, teams) {
  const results = {};
  teams.forEach(t => results[t] = {team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
  MATCHES.filter(m => m.group === group && m.status === 'completed').forEach(m => {
    const h = results[m.home], a = results[m.away];
    if(!h || !a) return;
    h.p++; a.p++;
    h.gf += m.homeScore; h.ga += m.awayScore;
    a.gf += m.awayScore; a.ga += m.homeScore;
    if(m.homeScore > m.awayScore) { h.w++; a.l++; h.pts += 3; }
    else if(m.homeScore < m.awayScore) { a.w++; h.l++; a.pts += 3; }
    else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
  });
  return Object.values(results).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

    const fav = maxProb === pred.home ? m.home : maxProb === pred.away ? m.away : '平局';
    html += `<div class="match-card upcoming">
      <div class="match-main" onclick="showMatchModal('${m.id}')">
        <div class="match-time-section"><div class="time">${m.date}</div><div class="period">${m.time}</div></div>

  });
  document.getElementById('predictionsList').innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--text2)">暫無即將開始的小組賽</div>';
}

function saveResult(matchId) {
  const homeScore = parseInt(document.getElementById(`score_${matchId}_home`).value);
  const awayScore = parseInt(document.getElementById(`score_${matchId}_away`).value);
  if(isNaN(homeScore) || isNaN(awayScore)) return alert('請輸入有效比分');
  userResults[matchId] = {homeScore, awayScore, timestamp: new Date().toISOString()};
  localStorage.setItem('wc2026_results', JSON.stringify(userResults));
  const match = MATCHES.find(m => m.id === matchId);
  if(match) { match.status = 'completed'; match.homeScore = homeScore; match.awayScore = awayScore; }
  renderMatchesByDate(); renderStandings(); renderPredictions(); renderCorners(); renderLive();
  alert('✅ 已保存並更新積分榜！');
}

function clearAllResults() {
  if(!confirm('確定要清除所有已輸入的賽果嗎？')) return;
  localStorage.removeItem('wc2026_results'); userResults = {}; location.reload();
}

    html += `<div style="font-size:0.8rem;padding:6px 0;border-bottom:1px solid var(--border)"><span>${match.home} 角球</span><span style="float:right">${pred.homeCorners}</span></div>`;
    html += `<div style="font-size:0.8rem;padding:6px 0;border-bottom:1px solid var(--border)"><span>${match.away} 角球</span><span style="float:right">${pred.awayCorners}</span></div>`;
    html += `<div style="font-size:0.8rem;padding:6px 0"><span>上半場角球</span><span style="float:right">${(pred.corners*0.45).toFixed(1)}</span></div>`;
    html += '</div>';
  }
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('matchModal').classList.add('active');
}

function closeModal() { document.getElementById('matchModal').classList.remove('active'); }

async function fetchRealOdds() {
  const sport = document.getElementById('sportKeySelect').value;
  const regions = document.getElementById('regionSelect').value;
  const markets = document.getElementById('marketSelect').value;
  const loadingEl = document.getElementById('oddsLoading');
  const errorEl = document.getElementById('oddsError');
  const contentEl = document.getElementById('oddsContent');
  loadingEl.innerHTML = '<div class="loading">正在連接 The-Odds-API...</div>';
  errorEl.innerHTML = ''; contentEl.innerHTML = '';
  try {
    const url = `${CONFIG.ODDS_API_BASE}/sports/${sport}/odds?apiKey=${CONFIG.ODDS_API_KEY}&regions=${regions}&markets=${markets}&oddsFormat=decimal&dateFormat=iso`;
    const response = await fetch(url);
    const remaining = response.headers.get('x-requests-remaining');
    if(!response.ok) { const errData = await response.json().catch(() => ({})); throw new Error(errData.message || `HTTP ${response.status}`); }
    const data = await response.json();
    realOddsData = data || [];
    const statusEl = document.getElementById('apiStatus');
    const statusText = document.getElementById('apiStatusText');
    statusEl.className = 'api-status connected';
    statusText.textContent = `賠率API已連接 | 剩餘: ${remaining || 'N/A'} | ${realOddsData.length} 場`;
    loadingEl.innerHTML = ''; renderOddsList(); analyzeValueOpportunities();
  } catch(err) {
    loadingEl.innerHTML = '';
    errorEl.innerHTML = `<div class="error"><strong>⚠️ API連接失敗</strong><br>${err.message}<br><br><button class="btn" onclick="useDemoOdds()" style="margin-top:8px">使用演示賠率</button></div>`;
    document.getElementById('apiStatus').className = 'api-status disconnected';
    document.getElementById('apiStatusText').textContent = '賠率API連接失敗';
  }
}

function useDemoOdds() {
  realOddsData = generateDemoOdds();
  document.getElementById('oddsError').innerHTML = '<div class="success">✅ 已加載演示賠率（基於模型概率）</div>';
  document.getElementById('apiStatus').className = 'api-status connected';
  document.getElementById('apiStatusText').textContent = '演示模式 | 模擬賠率';
  renderOddsList(); analyzeValueOpportunities();
}

function generateDemoOdds() {
  const demo = [];
  const upcoming = MATCHES.filter(m => m.status === 'upcoming');
  upcoming.forEach(m => {
    const pred = MODEL_PREDICTIONS[m.id];
    if(!pred) return;
    const margin = 1.08;
    const homeOdds = Math.max(1.1, (1/(pred.home*margin)) + (Math.random()*0.4-0.2));
    const drawOdds = Math.max(1.1, (1/(pred.draw*margin)) + (Math.random()*0.6-0.3));
    const awayOdds = Math.max(1.1, (1/(pred.away*margin)) + (Math.random()*0.4-0.2));
    const totalLine = pred.goals > 2.5 ? 2.5 : 2.0;
    const overOdds = pred.ou25 > 0.5 ? 1.85+Math.random()*0.3 : 2.0+Math.random()*0.4;
    const underOdds = pred.ou25 > 0.5 ? 1.95+Math.random()*0.3 : 1.8+Math.random()*0.3;
    demo.push({
      id: m.id, sport_key: 'soccer_fifa_world_cup', sport_title: 'FIFA World Cup 2026',
      commence_time: `2026-${m.date}T${m.time}:00Z`, home_team: m.home, away_team: m.away,
      bookmakers: [
        {key:'bet365',title:'Bet365',markets:[
          {key:'h2h',outcomes:[{name:m.home,price:homeOdds},{name:m.away,price:awayOdds},{name:'Draw',price:drawOdds}]},
          {key:'totals',outcomes:[{name:'Over',price:overOdds,point:totalLine},{name:'Under',price:underOdds,point:totalLine}]},
          {key:'btts',outcomes:[{name:'Yes',price:pred.btts>0.5?1.85:2.05},{name:'No',price:pred.btts>0.5?1.95:1.75}]}
        ]},
        {key:'williamhill',title:'William Hill',markets:[
          {key:'h2h',outcomes:[{name:m.home,price:homeOdds*0.98},{name:m.away,price:awayOdds*1.02},{name:'Draw',price:drawOdds*1.01}]},
          {key:'totals',outcomes:[{name:'Over',price:overOdds*0.97,point:totalLine},{name:'Under',price:underOdds*1.03,point:totalLine}]}
        ]},
        {key:'pinnacle',title:'Pinnacle',markets:[
          {key:'h2h',outcomes:[{name:m.home,price:homeOdds*1.03},{name:m.away,price:awayOdds*0.97},{name:'Draw',price:drawOdds*0.99}]},
          {key:'totals',outcomes:[{name:'Over',price:overOdds*1.02,point:totalLine},{name:'Under',price:underOdds*0.98,point:totalLine}]}
        ]}
      ]
    });
  });
  return demo;
}

    const h2hMarket = getMarket(match, 'h2h');

          </div>

        <div style="text-align:right">${modelPred ? renderValueTags(match, modelPred) : '<span style="font-size:0.7rem;color:var(--text2)">無模型</span>'}</div>

function renderValueTags(match, modelPred) {
  const tags = [];
  const h2hMarket = getMarket(match, 'h2h');
  if(h2hMarket) {
    h2hMarket.outcomes.forEach(out => {
      const prob = out.name === match.home_team ? modelPred.home : out.name === match.away_team ? modelPred.away : modelPred.draw;
      const implied = 1/out.price;
      const edge = prob - implied;
      if(edge > 0.05) tags.push(`<span class="value-tag positive">${out.name === 'Draw' ? '和' : out.name.substring(0,2)} +${(edge*100).toFixed(1)}%</span>`);
      else if(edge > 0.02) tags.push(`<span class="value-tag neutral">${out.name === 'Draw' ? '和' : out.name.substring(0,2)} +${(edge*100).toFixed(1)}%</span>`);
    });
  }
  return tags.length ? tags.join('') : '<span style="font-size:0.65rem;color:var(--text2)">暫無價值</span>';
}

  html += '</div>';
  html += '<div style="font-size:0.85rem;font-weight:700;margin:16px 0 10px;color:var(--accent)">🏢 公司對比</div>';
  html += '<table style="width:100%;font-size:0.75rem;border-collapse:collapse"><tr><th style="text-align:left;padding:8px;color:var(--text2);border-bottom:1px solid var(--border)">公司</th><th style="padding:8px;color:var(--text2);border-bottom:1px solid var(--border)">主勝</th><th style="padding:8px;color:var(--text2);border-bottom:1px solid var(--border)">平局</th><th style="padding:8px;color:var(--text2);border-bottom:1px solid var(--border)">客勝</th><th style="padding:8px;color:var(--text2);border-bottom:1px solid var(--border)">Margin</th></tr>';

    const m = bm.markets.find(m => m.key === 'h2h');

    const draw = m.outcomes.find(o => o.name === 'Draw')?.price || '-';
    const away = m.outcomes.find(o => o.name === match.away_team)?.price || '-';
    const margin = (typeof home === 'number' && typeof draw === 'number' && typeof away === 'number') ? ((1/home+1/draw+1/away-1)*100).toFixed(1)+'%' : '-';
    html += `<tr><td style="padding:8px;border-bottom:1px solid var(--border)">${bm.title}</td><td style="padding:8px;border-bottom:1px solid var(--border);text-align:center">${typeof home==='number'?home.toFixed(2):home}</td><td style="padding:8px;border-bottom:1px solid var(--border);text-align:center">${typeof draw==='number'?draw.toFixed(2):draw}</td><td style="padding:8px;border-bottom:1px solid var(--border);text-align:center">${typeof away==='number'?away.toFixed(2):away}</td><td style="padding:8px;border-bottom:1px solid var(--border);text-align:center">${margin}</td></tr>`;
  });
  html += '</table>';
  const totals = getMarket(match, 'totals');
  if(totals && modelPred) {
    html += '<div style="font-size:0.85rem;font-weight:700;margin:16px 0 10px;color:var(--accent)">⚽ 大小球</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">';

    const under = totals.outcomes.find(o => o.name === 'Under');
    const line = over?.point || 2.5;

    html += `<div style="text-align:center;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border)"><div style="font-size:0.8rem;color:var(--accent);font-weight:600">小 ${line}</div><div style="font-size:1.2rem;font-weight:700;margin-top:4px;color:${modelPred.ou25<0.45?'var(--green)':'var(--text)'}">${under?.price?.toFixed(2)||'-'}</div><div style="font-size:0.65rem;color:var(--text2);margin-top:2px">模型 ${((1-modelPred.ou25)*100).toFixed(0)}%</div>${modelPred.ou25<0.45?'<span class="value-tag positive" style="margin-top:4px">價值</span>':''}</div>`;
    html += '</div>';
  }
  const btts = getMarket(match, 'btts');
  if(btts && modelPred) {
    html += '<div style="font-size:0.85rem;font-weight:700;margin:16px 0 10px;color:var(--accent)">🤝 BTTS</div>';

    const no = btts.outcomes.find(o => o.name === 'No');
    html += `<div style="text-align:left;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border)"><div style="font-size:0.7rem;color:var(--text2)">是</div><div style="font-size:1.1rem;font-weight:700;margin-top:4px;color:${modelPred.btts>0.55?'var(--green)':'var(--text)'}">${yes?.price?.toFixed(2)||'-'}</div><div style="font-size:0.65rem;color:var(--text2);margin-top:2px">模型 ${(modelPred.btts*100).toFixed(0)}%</div>${modelPred.btts>0.55?'<span class="value-tag positive" style="margin-top:4px">價值</span>':''}</div>`;
    html += `<div style="text-align:left;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border)"><div style="font-size:0.7rem;color:var(--text2)">否</div><div style="font-size:1.1rem;font-weight:700;margin-top:4px;color:${modelPred.btts<0.45?'var(--green)':'var(--text)'}">${no?.price?.toFixed(2)||'-'}</div><div style="font-size:0.65rem;color:var(--text2);margin-top:2px">模型 ${((1-modelPred.btts)*100).toFixed(0)}%</div>${modelPred.btts<0.45?'<span class="value-tag positive" style="margin-top:4px">價值</span>':''}</div>`;
    html += '</div>';
  }
  if(modelPred) {
    html += '<div class="kelly-calc"><h5>📊 Kelly 資金管理</h5>';
    const bankroll = parseFloat(document.getElementById('bankroll')?.value || 10000);
    const kellyFrac = parseFloat(document.getElementById('kellyFraction')?.value || 0.25);
    const h2h = getMarket(match, 'h2h');
    if(h2h) {
      const homeOdds = getBestOdds(match, 'h2h', match.home_team)?.price;
      const awayOdds = getBestOdds(match, 'h2h', match.away_team)?.price;
      const drawOdds = getBestOdds(match, 'h2h', 'Draw')?.price;
      if(homeOdds && modelPred.home>0) { const edge=modelPred.home*homeOdds-1; const kelly=edge>0?(edge/(homeOdds-1))*kellyFrac*100:0; html += `<div class="kelly-row"><span>${match.home_team} 主勝 @${homeOdds.toFixed(2)}</span><span style="color:${kelly>0?'var(--green)':'var(--red)'}">${kelly>0?`投注 ${(bankroll*kelly/100).toFixed(0)} (${kelly.toFixed(1)}%)`:'無價值'}</span></div>`; }
      if(awayOdds && modelPred.away>0) { const edge=modelPred.away*awayOdds-1; const kelly=edge>0?(edge/(awayOdds-1))*kellyFrac*100:0; html += `<div class="kelly-row"><span>${match.away_team} 客勝 @${awayOdds.toFixed(2)}</span><span style="color:${kelly>0?'var(--green)':'var(--red)'}">${kelly>0?`投注 ${(bankroll*kelly/100).toFixed(0)} (${kelly.toFixed(1)}%)`:'無價值'}</span></div>`; }
      if(drawOdds && modelPred.draw>0) { const edge=modelPred.draw*drawOdds-1; const kelly=edge>0?(edge/(drawOdds-1))*kellyFrac*100:0; html += `<div class="kelly-row"><span>平局 @${drawOdds.toFixed(2)}</span><span style="color:${kelly>0?'var(--green)':'var(--red)'}">${kelly>0?`投注 ${(bankroll*kelly/100).toFixed(0)} (${kelly.toFixed(1)}%)`:'無價值'}</span></div>`; }
    }
    html += '</div>';
  }
  detailContent.innerHTML = html;
  detailCard.scrollIntoView({behavior:'smooth'});
}

function renderH2hBox(label, odds, modelProb, type) {
  if(!odds) return '';
  const implied = 1/odds;
  const edge = modelProb - implied;
  const isValue = edge > 0.03;
  const width = Math.min(modelProb * 100, 100);
  return `<div style="text-align:center;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid ${isValue?'var(--green)':'var(--border)'};position:relative;overflow:hidden">
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0.5;width:${width}%"></div>
    <div style="font-size:0.7rem;color:var(--text2);margin-bottom:4px">${label}</div>
    <div style="font-size:1.3rem;font-weight:700;color:${isValue?'var(--green)':'var(--text)'}">${odds.toFixed(2)}</div>
    <div style="font-size:0.65rem;color:var(--text2);margin-top:2px">隱含 ${(implied*100).toFixed(1)}% | 模型 ${(modelProb*100).toFixed(1)}%</div>
    <div style="font-size:0.7rem;margin-top:4px;color:${edge>0?'var(--green)':'var(--red)'}">${edge>0?'+':''}${(edge*100).toFixed(1)}%</div>
    ${isValue?'<span class="value-tag positive" style="margin-top:4px">價值</span>':''}
  </div>`;
}

function analyzeValueOpportunities() {
  valueOpportunities = [];
  realOddsData.forEach(match => {
    const modelPred = findModelPrediction(match.home_team, match.away_team);
    if(!modelPred) return;
    const h2h = getMarket(match, 'h2h');
    if(h2h) {
      h2h.outcomes.forEach(out => {
        const prob = out.name === match.home_team ? modelPred.home : out.name === match.away_team ? modelPred.away : modelPred.draw;
        const implied = 1/out.price;
        const edge = prob - implied;
        if(edge > 0.02) valueOpportunities.push({match:`${match.home_team} vs ${match.away_team}`,matchId:match.id,type:'1X2',selection:out.name==='Draw'?'平局':out.name,odds:out.price,modelProb:prob,impliedProb:implied,edge:edge,ev:(prob*out.price-1)*100,kelly:edge>0?(edge/(out.price-1)):0,confidence:modelPred.confidence});
      });
    }
    const totals = getMarket(match, 'totals');
    if(totals && modelPred.goals) {
      const over = totals.outcomes.find(o => o.name === 'Over');
      const under = totals.outcomes.find(o => o.name === 'Under');
      if(over) { const implied=1/over.price; const edge=modelPred.ou25-implied; if(edge>0.02) valueOpportunities.push({match:`${match.home_team} vs ${match.away_team}`,matchId:match.id,type:'大小球',selection:`大 ${over.point||2.5}`,odds:over.price,modelProb:modelPred.ou25,impliedProb:implied,edge:edge,ev:(modelPred.ou25*over.price-1)*100,kelly:edge>0?(edge/(over.price-1)):0,confidence:modelPred.confidence}); }
      if(under) { const implied=1/under.price; const edge=(1-modelPred.ou25)-implied; if(edge>0.02) valueOpportunities.push({match:`${match.home_team} vs ${match.away_team}`,matchId:match.id,type:'大小球',selection:`小 ${under.point||2.5}`,odds:under.price,modelProb:1-modelPred.ou25,impliedProb:implied,edge:edge,ev:((1-modelPred.ou25)*under.price-1)*100,kelly:edge>0?(edge/(under.price-1)):0,confidence:modelPred.confidence}); }
    }
    const btts = getMarket(match, 'btts');
    if(btts && modelPred.btts) {
      const yes = btts.outcomes.find(o => o.name === 'Yes');
      const no = btts.outcomes.find(o => o.name === 'No');
      if(yes) { const implied=1/yes.price; const edge=modelPred.btts-implied; if(edge>0.02) valueOpportunities.push({match:`${match.home_team} vs ${match.away_team}`,matchId:match.id,type:'BTTS',selection:'是',odds:yes.price,modelProb:modelPred.btts,impliedProb:implied,edge:edge,ev:(modelPred.btts*yes.price-1)*100,kelly:edge>0?(edge/(yes.price-1)):0,confidence:modelPred.confidence}); }
      if(no) { const implied=1/no.price; const edge=(1-modelPred.btts)-implied; if(edge>0.02) valueOpportunities.push({match:`${match.home_team} vs ${match.away_team}`,matchId:match.id,type:'BTTS',selection:'否',odds:no.price,modelProb:1-modelPred.btts,impliedProb:implied,edge:edge,ev:((1-modelPred.btts)*no.price-1)*100,kelly:edge>0?(edge/(no.price-1)):0,confidence:modelPred.confidence}); }
    }
  });
  valueOpportunities.sort((a,b) => b.edge - a.edge);
}

function renderValueAnalysis() {
  renderValueTabContent('all', document.getElementById('valueAllContent'));
  renderValueTabContent('h2h', document.getElementById('valueH2hContent'));
  renderValueTabContent('totals', document.getElementById('valueTotalsContent'));
  renderValueTabContent('btts', document.getElementById('valueBttsContent'));
  const bankroll = parseFloat(document.getElementById('bankroll').value || 10000);
  const kellyFrac = parseFloat(document.getElementById('kellyFraction').value || 0.25);
  let kellyHtml = '';
  const topOpps = valueOpportunities.filter(o => o.edge > 0.03).slice(0, 5);
  if(topOpps.length) {
    kellyHtml += '<div style="font-size:0.8rem;color:var(--accent);margin-bottom:8px;font-weight:600">💡 Top 5 價值機會</div>';
    topOpps.forEach((opp, i) => { const stake = bankroll * opp.kelly * kellyFrac; kellyHtml += `<div class="kelly-row"><span>${i+1}. ${opp.match} - ${opp.selection} @${opp.odds.toFixed(2)}</span><span style="color:var(--green)">${stake.toFixed(0)} (${(opp.kelly*kellyFrac*100).toFixed(1)}%)</span></div>`; });
  } else { kellyHtml += '<div style="font-size:0.8rem;color:var(--text2);text-align:center;padding:10px">暫無明顯價值機會</div>'; }
  document.getElementById('kellyResults').innerHTML = kellyHtml;
}

function renderValueTabContent(type, container) {
  const filtered = type === 'all' ? valueOpportunities : valueOpportunities.filter(o => o.type === type);
  if(!filtered.length) { container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2);font-size:0.8rem">暫無價值機會</div>'; return; }
  let html = '';
  filtered.forEach(opp => {
    const evClass = opp.ev > 10 ? 'positive' : opp.ev > 5 ? 'neutral' : 'negative';
    const confColor = opp.confidence === 'HIGH' ? 'var(--green)' : opp.confidence === 'MEDIUM' ? 'var(--yellow)' : 'var(--red)';
    html += `<div class="match-card" style="cursor:pointer" onclick="showOddsDetail('${opp.matchId}')">
      <div class="match-main">
        <div style="flex:1">
          <div style="font-size:0.8rem;font-weight:600">${opp.match}</div>
          <div style="font-size:0.7rem;color:var(--text2);margin-top:2px">${opp.type} - ${opp.selection}</div>
          <div style="display:flex;gap:6px;margin-top:4px;font-size:0.65rem">
            <span style="color:var(--accent)">賠率 ${opp.odds.toFixed(2)}</span>
            <span style="color:var(--text2)">隱含 ${(opp.impliedProb*100).toFixed(1)}%</span>
            <span style="color:${confColor}">信心 ${opp.confidence}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:1.1rem;font-weight:700;color:var(--green)">+${(opp.edge*100).toFixed(1)}%</div>
          <div style="font-size:0.7rem;color:var(--text2)">EV ${opp.ev > 0 ? '+' : ''}${opp.ev.toFixed(1)}%</div>
          <span class="value-tag ${evClass}">${opp.ev > 0 ? '價值' : '無價值'}</span>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function getMarket(match, marketKey) {
  if(!match.bookmakers) return null;
  for(const bm of match.bookmakers) { const m = bm.markets.find(m => m.key === marketKey); if(m) return m; }
  return null;
}
function getBestOdds(match, marketKey, outcomeName) {
  let best = null;
  if(!match.bookmakers) return null;
  match.bookmakers.forEach(bm => { const m = bm.markets.find(m => m.key === marketKey); if(!m) return; const out = m.outcomes.find(o => o.name === outcomeName); if(out && (!best || out.price > best.price)) best = {price: out.price, bookmaker: bm.title}; });
  return best;
}
function getAverageOdds(match, marketKey, outcomeName) {
  let sum = 0, count = 0;
  if(!match.bookmakers) return null;
  match.bookmakers.forEach(bm => { const m = bm.markets.find(m => m.key === marketKey); if(!m) return; const out = m.outcomes.find(o => o.name === outcomeName); if(out) { sum += out.price; count++; } });
  return count > 0 ? sum/count : null;
}
function countUniqueBookmakers() { const set = new Set(); realOddsData.forEach(m => m.bookmakers?.forEach(b => set.add(b.key))); return set.size; }
function findModelPrediction(home, away) { const match = MATCHES.find(m => m.home === home && m.away === away); return match ? MODEL_PREDICTIONS[match.id] : null; }
function formatDateTime(iso) { if(!iso) return '-'; const d = new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function refreshAllData() { renderMatchesByDate(); renderStandings(); renderPredictions(); renderCorners(); renderLive(); if(document.getElementById('odds').classList.contains('active')) fetchRealOdds(); if(document.getElementById('value').classList.contains('active')) renderValueAnalysis(); }
document.getElementById('matchModal').addEventListener('click', function(e) { if(e.target === this) closeModal(); });
init();
</script>
