<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified WC2026 - 世界盃智能預測</title>
    <style>
        :root {
            --primary: #60a5fa;
            --accent: #f472b6;
            --success: #4ade80;
        }
        body {
            font-family: "Microsoft YaHei", system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; color: var(--primary); margin: 10px 0; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; }
        .update-time { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 20px; }

        .match-card {
            background: #1e2937;
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        .match-card:hover { transform: translateY(-4px); }

        .league { color: var(--primary); font-size: 15px; margin-bottom: 10px; }
        .teams { display: flex; justify-content: space-between; align-items: center; font-size: 19px; font-weight: bold; margin: 12px 0; }
        .score { color: #fbbf24; font-size: 26px; font-weight: bold; }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 12px 0;
            font-size: 14px;
        }
        .stat-item {
            background: #334155;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label { color: #94a3b8; font-size: 12px; }
        .stat-value { font-weight: bold; color: #fbbf24; }

        .odds {
            background: #334155;
            padding: 12px;
            border-radius: 10px;
            margin: 12px 0;
            font-size: 15px;
        }
        .recommend {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            font-weight: 500;
        }

        button {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 17px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🏆 Unified WC2026 世界盃智能預測</h1>
    <div class="subtitle">2026 加拿大・墨西哥・美國世界盃 | Bet365 即時賠率</div>
    <div class="update-time" id="update-time">載入中...</div>

    <div id="matches-container"></div>

    <button onclick="refreshData()">🔄 手動刷新最新數據</button>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                document.getElementById('update-time').textContent = 
                    `最後更新: ${data.last_update}`;

                const container = document.getElementById('matches-container');
                container.innerHTML = '';

                data.matches.forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'match-card';

                    let oddsHTML = '';
                    if (match.bet365_odds) {
                        const o = match.bet365_odds;
                        oddsHTML = `
                            <div class="odds">
                                <strong>${match.home}</strong> ${o.home_win || '-'} | 
                                平局 ${o.draw || '-'} | 
                                <strong>${match.away}</strong> ${o.away_win || '-'}
                            </div>
                        `;
                    }

                    const pred = match.predictions || {};
                    const rec = match.recommendations ? match.recommendations.join(" • ") : "推薦觀察";

                    card.innerHTML = `
                        <div class="league">${match.league}</div>
                        <div class="teams">
                            <span>${match.home}</span>
                            <span class="score">${match.home_score} - ${match.away_score}</span>
                            <span>${match.away}</span>
                        </div>
                        <div class="status">${match.status || '即將開賽'}</div>

                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-label">主勝</div>
                                <div class="stat-value">${(pred.home_win_prob * 100 || 0).toFixed(0)}%</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">平局</div>
                                <div class="stat-value">${(pred.draw_prob * 100 || 0).toFixed(0)}%</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">客勝</div>
                                <div class="stat-value">${(pred.away_win_prob * 100 || 0).toFixed(0)}%</div>
                            </div>
                        </div>

                        ${oddsHTML}

                        <div class="recommend">
                            ${rec}<br>
                            <small>Edge: ${match.edge_values ? Object.values(match.edge_values)[0] || '' : ''}</small>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                document.getElementById('matches-container').innerHTML = 
                    `<p style="color:#f87171; text-align:center;">⚠️ 無法載入數據</p>`;
            }
        }

        function refreshData() {
            document.getElementById('update-time').textContent = "正在更新最新數據...";
            loadData();
        }

        window.onload = loadData;
        setInterval(loadData, 180000); // 每3分鐘自動更新
    </script>
</body>
</html>
