.prob-bar-container { margin: 6px 0; }
.prob-label { display: flex; justify-content: space-between; font-size: 0.75rem; }
.prob-bar-bg { height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }

.prob-bar-fill.draw { background: linear-gradient(90deg, var(--warning), #fbbf24); }
.prob-bar-fill.away { background: linear-gradient(90deg, var(--danger), #f87171); }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
.stat-box { background: var(--bg-primary); border-radius: 8px; padding: 10px 4px; text-align: center; border: 1px solid var(--border); }
.stat-value { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 0.7rem; color: var(--text-secondary); }
.tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin: 3px; }
.tag-high { background: rgba(16,185,129,0.2); color: var(--accent); border: 1px solid var(--accent); }
.tag-medium { background: rgba(59,130,246,0.2); color: var(--info); border: 1px solid var(--info); }
.section { display: none; }
.section.active { display: block; }
.alert-box { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 10px; margin: 8px 0; font-size: 0.85rem; }
.alert-box.info { background: rgba(59,130,246,0.1); border-color: var(--info); color: var(--info); }
.alert-box.success { background: rgba(16,185,129,0.1); border-color: var(--accent); color: var(--accent); }
.detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }

.detail-toggle { text-align: center; color: var(--accent); font-size: 0.8rem; cursor: pointer; padding: 6px; margin-top: 8px; border-top: 1px solid var(--border); }

.mot-fill { height: 100%; border-radius: 3px; }

.mot-fill.med { background: linear-gradient(90deg, var(--warning), var(--accent)); }
.mot-value { font-size: 0.75rem; font-weight: 600; min-width: 32px; text-align: right; }
.mini-pred { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

.footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 10px; text-align: center; font-size: 0.7rem; color: var(--text-secondary); z-index: 100; }

// ===== 數學工具 =====
const M = {
  fact: (n) => { if(n<=1)return 1; let r=1; for(let i=2;i<=n;i++)r*=i; return r; },
  poi: (lam,k) => (Math.pow(lam,k)*Math.exp(-lam))/M.fact(k),
  poiCDF: (lam,t,tail='upper') => { let cdf=0; for(let i=0;i<=Math.floor(t);i++)cdf+=M.poi(lam,i); return tail==='upper'?1-cdf:cdf; },
  eloExp: (ra,rb) => 1/(1+Math.pow(10,(rb-ra)/400)),
};

// ===== 預測引擎 =====
class Engine {
  constructor() {
    this.p = { eloHomeAdv:15, drawBase:0.18, avgGoals:2.85, avgCorners:9.5, avgCards:2.8,
               busBreaker:1.25, topClash:0.95, sameForm:0.95, defClash:0.70, defClashTh:1600,
               weakCollapse:0.80, weakTh:1450, possBusCorner:1.20, defDefCorner:0.80, bttsAdj:0.90,
               htGoalRatio:0.40, htCornerRatio:0.48, htDrawBase:0.22, htOU:1.0, htCorner:4.0,
               ouLine:2.0, cornerLine:9.0 };
  }
  winProb(hElo,aElo) {
    const hExp=M.eloExp(hElo+this.p.eloHomeAdv,aElo), aExp=M.eloExp(aElo,hElo+this.p.eloHomeAdv);
    const diff=Math.abs(hElo+this.p.eloHomeAdv-aElo);
    let draw=Math.min(this.p.drawBase+Math.max(0,0.12-diff/400*0.08),0.40);
    const rem=1-draw, tot=hExp+aExp;
    return {home:hExp*rem/tot, draw:draw, away:aExp*rem/tot};
  }
  goals(home,away,round) {
    const diff=home.elo-away.elo;
    let hXg=this.p.avgGoals/2+diff/300*0.15, aXg=this.p.avgGoals/2-diff/300*0.15;
    if(round===2){hXg*=this.p.topClash; aXg*=this.p.topClash;}
    if(away.style==='defensive')hXg*=this.p.busBreaker;
    if(home.style==='defensive'&&away.style==='defensive'&&home.elo>this.p.defClashTh&&away.elo>this.p.defClashTh){hXg*=this.p.defClash; aXg*=this.p.defClash;}
    const diff=home.elo-away.elo; if(Math.abs(diff)>200){if(diff>0)aXg*=this.p.weakCollapse; else hXg*=this.p.weakCollapse;}
    hXg=Math.max(0.3,Math.min(hXg,3.5)); aXg=Math.max(0.2,Math.min(aXg,2.5));
    const tot=hXg+aXg;
    const btts=(1-Math.exp(-hXg))*(1-Math.exp(-aXg))*this.p.bttsAdj;
    return {hXg,aXg,tot,btts};
  }
  corners(home,away) {
    let exp=this.p.avgCorners;
    const sm={attacking:1.08,defensive:0.92,balanced:1.0,counter:0.95,possession:1.15};
    exp*=(sm[home.style||'balanced']+sm[away.style||'balanced'])/2;
    if((['possession','attacking'].includes(home.style)&&['defensive','counter'].includes(away.style))||
       (['possession','attacking'].includes(away.style)&&['defensive','counter'].includes(home.style)))exp*=this.p.possBusCorner;
    if(home.style==='defensive'&&away.style==='defensive')exp*=this.p.defDefCorner;
    exp=Math.max(2,Math.min(exp,16));
    return {exp, over:M.poiCDF(exp,this.p.cornerLine,'upper'), under:M.poiCDF(exp,this.p.cornerLine,'lower'), line:this.p.cornerLine};
  }
  htGoals(home,away,round,ft) {
    let hH=ft.hXg*this.p.htGoalRatio, aH=ft.aXg*this.p.htGoalRatio;
    if(round===2){hH*=0.95; aH*=0.95;}
    return {hH,aH,tot:hH+aH, btts:(1-Math.exp(-hH))*(1-Math.exp(-aH))};
  }
  ht1x2(home,away) {
    const hExp=M.eloExp(home.elo+this.p.eloHomeAdv*1.2,away.elo), aExp=M.eloExp(away.elo,home.elo+this.p.eloHomeAdv*1.2);
    let draw=Math.min(this.p.htDrawBase+Math.max(0,0.10-Math.abs(home.elo-away.elo)/400*0.08),0.50);
    const rem=1-draw, tot=hExp+aExp;
    let hW=hExp*rem, aW=aExp*rem;
    const t=hW+draw+aW;
    return {home:hW/t, draw:draw/t, away:aW/t};
  }
  scores(hXg,aXg,maxG=4) {
    const s={}; for(let h=0;h<=maxG;h++)for(let a=0;a<=maxG;a++)s[h+'-'+a]=M.poi(hXg,h)*M.poi(aXg,a);
    const t=Object.values(s).reduce((a,b)=>a+b,0);
    if(t>0)for(let k in s)s[k]/=t;
    return s;
  }
  standings() {
    const g={}; for(const gr of WC.groups)g[gr]={};
    for(const [name,info] of Object.entries(WC.teams)){
      if(!g[info.group])g[info.group]={};
      g[info.group][name]={P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,rank:4};
    }
    for(const r of WC.results){
      const [hg,ag]=r.score.split('-').map(Number);
      const hG=WC.teams[r.home]?.group, aG=WC.teams[r.away]?.group;
      if(!hG||!aG)continue;
      const h=g[hG][r.home], a=g[aG][r.away];
      if(!h||!a)continue;
      h.P++; a.P++; h.GF+=hg; h.GA+=ag; h.GD+=hg-ag; a.GF+=ag; a.GA+=hg; a.GD+=ag-hg;
      if(hg>ag){h.W++;a.L++;h.Pts+=3;}else if(hg<ag){a.W++;h.L++;a.Pts+=3;}else{h.D++;a.D++;h.Pts++;a.Pts++;}
    }
    for(const gr of WC.groups){
      const t=Object.entries(g[gr]).sort((a,b)=>{if(b[1].Pts!=a[1].Pts)return b[1].Pts-a[1].Pts;if(b[1].GD!=a[1].GD)return b[1].GD-a[1].GD;return b[1].GF-a[1].GF;});
      t.forEach((x,i)=>{g[gr][x[0]].rank=i+1;});
    }
    return g;
  }
  motivation(name,group,round) {
    const st=this.standings()[group]?.[name];
    if(!st)return{score:5,desc:'數據不足'};
    const pts=st.Pts||0, p=st.P||0;
    if(p<2)return{score:5,desc:'只完成1場，形勢未明'};
    if(pts>=4)return{score:6,desc:'形勢較好，仍需搶分確保出線'};
    if(pts===3)return{score:8.5,desc:'次席僅3分，R3生死戰必須取勝'};
    if(pts===2)return{score:8,desc:'2分形勢危急，必須取勝且看臉色'};
    if(pts===1)return{score:9.5,desc:'僅1分，必須大勝且其他結果配合'};
    return{score:3,desc:'0分但理論上仍有機會，戰意存疑'};
  }
  predict(m) {
    const h=WC.teams[m.home]||{elo:1500,flag:'⚽',style:'balanced'}, a=WC.teams[m.away]||{elo:1500,flag:'⚽',style:'balanced'};
    const hT={name:m.home,elo:h.elo,flag:h.flag,style:h.style||'balanced',formation:h.formation||'4-2-3-1'};
    const aT={name:m.away,elo:a.elo,flag:a.flag,style:a.style||'balanced',formation:a.formation||'4-2-3-1'};
    const wP=this.winProb(h.elo,a.elo);
    const g=this.goals(hT,aT,m.round);
    const c=this.corners(hT,aT);
    const htG=this.htGoals(hT,aT,m.round,g);
    const ht1=this.ht1x2(hT,aT);
    const cs=this.scores(g.hXg,g.aXg);
    const htCS=this.scores(htG.hH,htG.aH,3);
    const hM=this.motivation(m.home,m.group,m.round);
    const aM=this.motivation(m.away,m.group,m.round);
    let pU=0; for(let i=0;i<=Math.floor(this.p.ouLine);i++)pU+=M.poi(g.tot,i);
    const pO=1-pU;
    let htPU=0; for(let i=0;i<=Math.floor(this.p.htOU);i++)htPU+=M.poi(htG.tot,i);
    const htPO=1-htPU;
    const htCE=c.exp*this.p.htCornerRatio;
    const htCO=M.poiCDF(htCE,this.p.htCorner,'upper');
    const conf=Math.min(Math.abs(h.elo-a.elo)/400,1)*0.5+Math.max(wP.home,wP.draw,wP.away)*0.5;
    const vB=[];
    if(wP.home>0.55)vB.push({m:'1X2',s:'主勝',p:wP.home,c:'HIGH'});
    if(wP.away>0.55)vB.push({m:'1X2',s:'客勝',p:wP.away,c:'HIGH'});
    if(pO>0.55)vB.push({m:'大2.5',s:'大',p:pO,c:'HIGH'});
    if(pU>0.55)vB.push({m:'小2.5',s:'小',p:pU,c:'HIGH'});
    if(g.btts>0.55)vB.push({m:'BTTS',s:'是',p:g.btts,c:'MEDIUM'});
    if(c.over>0.55)vB.push({m:'角球大9',s:'大角',p:c.over,c:'MEDIUM'});
    let up=null;
    if(hM.score<3&&aM.score>8&&h.elo-a.elo>100)up={lv:'HIGH',msg:aT.name+'戰意爆棚 vs '+hT.name+'戰意低迷，注意爆冷'};
    else if(aM.score<3&&hM.score>8&&a.elo-h.elo>100)up={lv:'HIGH',msg:hT.name+'戰意爆棚 vs '+aT.name+'戰意低迷，注意爆冷'};
    else if(Math.abs(hM.score-aM.score)>4)up={lv:'MEDIUM',msg:'雙方戰意差異顯著'};
    return {m,hT,aT,wP,g,c,htG,ht1,cs,htCS,pO,pU,htPO,htPU,htCE,htCO,cards:this.p.avgCards,conf,vB,up,hM,aM};
  }
  backtest() {
    const results=WC.results;
    let c1x2=0, cOU=0, cBTTS=0, cCorner=0;
    for(const r of results){
      const m=WC.fixtures.find(f=>f.id===r.id);
      if(!m)continue;
      const p=this.predict(m);
      const [hg,ag]=r.score.split('-').map(Number);
      const actual=hg>ag?'home':hg<ag?'away':'draw';
      const pred1x2=p.wP.home>p.wP.draw&&p.wP.home>p.wP.away?'home':p.wP.away>p.wP.draw?'away':'draw';
      if(actual===pred1x2)c1x2++;
      const total=hg+ag;
      if((total>2.5&&p.pO>0.5)||(total<=2.5&&p.pU>0.5))cOU++;
      const bttsActual=hg>0&&ag>0;
      if((bttsActual&&p.g.btts>0.5)||(!bttsActual&&p.g.btts<=0.5))cBTTS++;
      if(r.corners){
        const [hc,ac]=r.corners.split('-').map(Number);
        const ct=hc+ac;
        if((ct>8.5&&p.c.over>0.5)||(ct<=8.5&&p.c.under>0.5))cCorner++;
      }
    }
    const n=results.length;
    return {total:n, x12:(c1x2/n*100).toFixed(1), ou:(cOU/n*100).toFixed(1), btts:(cBTTS/n*100).toFixed(1), corner:(cCorner/n*100).toFixed(1)};
  }
}
const engine=new Engine();

      '<div style="margin-top:6px;font-size:0.8rem;">大小球 1.0: 大'+Math.round(pred.htPO*100)+'% | 小'+Math.round(pred.htPU*100)+'%</div>'+
      '<div style="margin-top:6px;font-size:0.8rem;">BTTS: '+Math.round(pred.htG.btts*100)+'% | 角球大4: '+Math.round(pred.htCO*100)+'%</div>'+
      '<div class="score-grid" style="margin-top:8px;">'+htSG+'</div>'+
      '<div class="card-title" style="margin-top:14px;">🎯 全場波膽 Top 5</div><div class="score-grid">'+sg+'</div>'+
      '<div class="card-title" style="margin-top:14px;">📐 角球預測</div><div class="mini-pred"><span class="mini-pred-label">預期角球</span><span class="mini-pred-value">'+pred.c.exp.toFixed(1)+'</span></div><div class="mini-pred"><span class="mini-pred-label">大9角</span><span class="mini-pred-value">'+Math.round(pred.c.over*100)+'%</span></div>'+
      '<div class="card-title" style="margin-top:14px;">🃏 罰牌預測</div><div class="mini-pred"><span class="mini-pred-label">預期罰牌</span><span class="mini-pred-value">'+pred.cards.toFixed(1)+'</span></div>'+
      '<div class="card-title" style="margin-top:14px;">💡 價值投注</div>'+(vH||'<span style="font-size:0.8rem;color:var(--text-secondary);">暫無明確價值機會</span>')+upH+
      '</div></div>'+
      '<div class="detail-toggle" onclick="toggleDetail('+m.id+')">'+(showDetail?'▲ 收起詳情':'▼ 展開詳情')+'</div>';
    return '<div class="match-card" data-match-id="'+m.id+'">'+
      '<div class="match-header"><span>'+m.group+'組 | R'+m.round+' | '+v.city+'</span><span style="color:var(--accent);">'+fd(m.date)+' '+ft(m.time)+'</span></div>'+
      '<div class="match-teams"><div class="team-box"><div class="team-flag">'+h.flag+'</div><div class="team-name">'+m.home+'</div><div class="team-elo">Elo '+h.elo+'</div></div>'+
      '<div class="vs-box"><div class="vs-text">VS</div><div style="font-size:0.75rem;color:var(--text-secondary);">'+ft(m.time)+'</div></div>'+
      '<div class="team-box"><div class="team-flag">'+a.flag+'</div><div class="team-name">'+m.away+'</div><div class="team-elo">Elo '+a.elo+'</div></div></div>'+
      '<div style="margin-top:10px;">'+pb('主勝',pred.wP.home,'home')+pb('和局',pred.wP.draw,'draw')+pb('客勝',pred.wP.away,'away')+'</div>'+
      '<div class="stats-grid" style="margin-top:10px;">'+
      '<div class="stat-box"><div class="stat-value">'+pred.g.tot.toFixed(2)+'</div><div class="stat-label">預期入球</div></div>'+
      '<div class="stat-box"><div class="stat-value">'+Math.round(pred.pO*100)+'%</div><div class="stat-label">大2.5</div></div>'+
      '<div class="stat-box"><div class="stat-value">'+Math.round(pred.g.btts*100)+'%</div><div class="stat-label">BTTS</div></div>'+
      '<div class="stat-box"><div class="stat-value">'+Math.round(pred.conf*100)+'%</div><div class="stat-label">信心度</div></div>'+
      '</div>'+detailHTML+'</div>';
  } catch(e) {
    console.error('renderMatchCard error:', e);
    return '<div class="card"><div class="alert-box">渲染錯誤</div></div>';
  }
}

function toggleDetail(id) {
  const p=$('detail-'+id);
  if(p){p.classList.toggle('open'); const t=p.nextElementSibling; if(t)t.textContent=p.classList.contains('open')?'▲ 收起詳情':'▼ 展開詳情';}
}

function renderToday() {
  try {
    const today='2026-06-24';
    const matches=WC.fixtures.filter(f=>f.date===today);
    let html='<div class="card"><div class="card-title">📅 今日賽事 ('+matches.length+'場)</div></div>';
    if(matches.length===0){
      html+='<div class="card"><div style="text-align:center;padding:20px;color:var(--text-secondary);">今日暫無世界盃賽事<br><span style="font-size:0.8rem;">下次賽事: 6月25日</span></div></div>';
    } else {
      for(const m of matches){html+=renderMatchCard(engine.predict(m),true);}
    }
    $('section-today').innerHTML=html;
  } catch(e){$('section-today').innerHTML='<div class="card"><div class="alert-box">加載錯誤</div></div>';}
}

function renderSchedule() {
  try {
    let html='<div class="card"><div class="card-title">📋 完整賽程 (48場)</div></div>';
    let curD='';
    for(const m of WC.fixtures){
      if(m.date!==curD){curD=m.date; html+='<div class="card" style="background:var(--bg-secondary);margin-top:16px;"><div style="font-weight:700;color:var(--accent);">'+fd(curD)+'</div></div>';}
      const h=WC.teams[m.home]||{}, a=WC.teams[m.away]||{};
      const v=WC.venues[m.venue]||{city:m.venue};
      const r=WC.results.find(x=>x.id===m.id);
      html+='<div class="match-card" style="padding:10px 14px;"><div style="display:flex;justify-content:space-between;align-items:center;"><div style="display:flex;align-items:center;gap:8px;flex:1;"><span style="font-size:0.7rem;color:var(--text-secondary);min-width:45px;">'+ft(m.time)+'</span><span style="font-size:0.75rem;color:var(--accent);">'+m.group+'</span><span style="font-size:1.1rem;">'+h.flag+'</span><span style="font-size:0.85rem;font-weight:600;">'+m.home+'</span><span style="font-size:0.75rem;color:var(--text-secondary);">vs</span><span style="font-size:0.85rem;font-weight:600;">'+m.away+'</span><span style="font-size:1.1rem;">'+a.flag+'</span></div><div style="text-align:right;min-width:60px;">'+(r?'<span style="color:var(--accent);font-weight:700;">'+r.score+'</span>':'<span style="font-size:0.75rem;color:var(--text-secondary);">未開賽</span>')+'</div></div><div style="font-size:0.7rem;color:var(--text-secondary);margin-top:4px;padding-left:55px;">'+v.city+' | R'+m.round+'</div></div>';
    }
    $('section-schedule').innerHTML=html;
  } catch(e){$('section-schedule').innerHTML='<div class="card"><div class="alert-box">加載錯誤</div></div>';}
}

function renderStandings() {
  try {
    const st=engine.standings();
    let html='<div class="card"><div class="card-title">🏆 小組積分榜</div></div>';
    for(const g of WC.groups){
      const t=Object.entries(st[g]).sort((a,b)=>{if(b[1].Pts!=a[1].Pts)return b[1].Pts-a[1].Pts;if(b[1].GD!=a[1].GD)return b[1].GD-a[1].GD;return b[1].GF-a[1].GF;});
      html+='<div class="card"><div style="font-weight:700;color:var(--accent);margin-bottom:8px;">'+g+'組</div>';
      html+='<table class="standings-table"><tr><th>球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>得</th><th>失</th><th>差</th><th>分</th></tr>';
      for(const [name,s] of t){
        const info=WC.teams[name]||{};
        const cl=s.rank<=2?'qualified':'';
        html+='<tr class="'+cl+'"><td>'+(info.flag||'⚽')+' '+name+'</td><td>'+s.P+'</td><td>'+s.W+'</td><td>'+s.D+'</td><td>'+s.L+'</td><td>'+s.GF+'</td><td>'+s.GA+'</td><td>'+(s.GD>0?'+':'')+s.GD+'</td><td style="font-weight:700;">'+s.Pts+'</td></tr>';
      }
      html+='</table></div>';
    }
    html+='<div class="card" style="font-size:0.8rem;color:var(--text-secondary);"><span style="color:var(--accent);">●</span> 綠色 = 晉級區 (前2名)</div>';
    $('section-standings').innerHTML=html;
  } catch(e){$('section-standings').innerHTML='<div class="card"><div class="alert-box">加載錯誤</div></div>';}
}

function renderLive() {
  try {
    let html='<div class="card"><div class="card-title">📡 滾球監控</div><div style="font-size:0.8rem;color:var(--text-secondary);margin-top:8px;">當前無進行中賽事。示範數據:</div></div>';

function renderPredictions() {
  try {
    const bt=engine.backtest();

      '<div class="stat-box"><div class="stat-value">'+bt.btts+'%</div><div class="stat-label">BTTS</div></div>'+

}

function renderAlerts() {
  try {
    let html='<div class="card"><div class="card-title">🚨 爆冷預警</div></div>';
    const r3=WC.fixtures.filter(f=>f.round===3);
    const alerts=[];
    for(const m of r3){const p=engine.predict(m); if(p.up)alerts.push({m,p});}
    alerts.sort((a,b)=>(b.p.up.lv==='HIGH'?1:0)-(a.p.up.lv==='HIGH'?1:0));
    if(alerts.length===0){
      html+='<div class="card"><div class="alert-box info">✅ 當前R3無明顯爆冷預警</div></div>';
    } else {
      html+='<div class="card"><div style="font-size:0.85rem;margin-bottom:8px;">發現 '+alerts.length+' 場潛在爆冷</div></div>';
      for(const a of alerts){
        const m=a.m, h=WC.teams[m.home]||{}, aa=WC.teams[m.away]||{};
        html+='<div class="match-card"><div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="font-size:0.8rem;color:var(--text-secondary);">'+m.group+'組 R3</span><span style="font-size:0.75rem;color:var(--danger);font-weight:700;">🔴 '+a.p.up.lv+'</span></div><div class="match-teams"><div class="team-box"><div class="team-flag">'+h.flag+'</div><div class="team-name">'+m.home+'</div></div><div class="vs-box"><div class="vs-text">VS</div></div><div class="team-box"><div class="team-flag">'+aa.flag+'</div><div class="team-name">'+m.away+'</div></div></div><div class="alert-box" style="margin-top:10px;">'+a.p.up.msg+'</div><div style="margin-top:8px;font-size:0.8rem;">'+mm(m.home,a.p.hM.score)+mm(m.away,a.p.aM.score)+'</div></div>';
      }
    }
    $('section-alerts').innerHTML=html;
  } catch(e){$('section-alerts').innerHTML='<div class="card"><div class="alert-box">加載錯誤</div></div>';}
}

// ===== 分頁切換 =====
function switchSection(name) {
  try {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    const target=$('section-'+name); if(target)target.classList.add('active');
    const tab=document.querySelector('.nav-tab[data-section="'+name+'"]'); if(tab)tab.classList.add('active');
    switch(name){
      case 'today': renderToday(); break;
      case 'schedule': renderSchedule(); break;
      case 'standings': renderStandings(); break;
      case 'live': renderLive(); break;
      case 'predictions': renderPredictions(); break;
      case 'alerts': renderAlerts(); break;
    }
    window.scrollTo({top:0,behavior:'smooth'});
  } catch(e){console.error('switchSection error:',e);}
}

document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>switchSection(tab.dataset.section));
});
