<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified WC2026 - 世界盃智能預測</title>
    <style>
        body { font-family: "Microsoft YaHei", system-ui, sans-serif; background: linear-gradient(135deg, #0f172a, #1e2937); color: #e2e8f0; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #60a5fa; margin: 10px 0; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        .update-time { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 20px; }

        .match-card {
            background: #1e2937;
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .teams { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; margin: 12px 0; }
        .score { color: #fbbf24; font-size: 28px; font-weight: bold; }

        .xg-bar { height: 8px; background: #334155; border-radius: 4px; margin: 8px 0; overflow: hidden; }
        .xg-home { height: 100%; background: linear-gradient(90deg, #60a5fa, #3b82f6); }
        .xg-away { height: 100%; background: linear-gradient(90deg, #f472b6, #db2777); }

        .recommend { background: rgba(74, 222, 128, 0.15); color: #4ade80; padding: 12px; border-radius: 10px; margin-top: 12px; font-weight: 500; }
    </style>
</head>
<body>
    <h1>🏆 Unified WC2026 世界盃智能預測</h1>
    <div class="subtitle">xG + Monte Carlo + Bet365 即時數據</div>
    <div class="update-time" id="update-time">載入中...</div>

    <div id="matches-container"></div>

    <button onclick="refreshData()">🔄 重新運行 Monte Carlo 模擬</button>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                document.getElementById('update-time').textContent = `最後更新: ${data.last_update}`;

                const container = document.getElementById('matches-container');
                container.innerHTML = '';

                data.matches.forEach(match => {
                    const xg = match.xg || {home_xg: 1.65, away_xg: 1.45};

                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="league">${match.league}</div>
                        <div class="teams">
                            <span>${match.home}</span>
                            <span class="score">${match.home_score} - ${match.away_score}</span>
                            <span>${match.away}</span>
                        </div>

                        <div style="margin:12px 0;">
                            <div style="display:flex; justify-content:space-between; font-size:13px;">
                                <span>${match.home} xG ${xg.home_xg}</span>
                                <span>${match.away} xG ${xg.away_xg}</span>
                            </div>
                            <div class="xg-bar"><div class="xg-home" style="width: ${xg.home_xg * 35}%"></div></div>
                            <div class="xg-bar"><div class="xg-away" style="width: ${xg.away_xg * 35}%"></div></div>
                        </div>

                        <div class="recommend">
                            推薦：大 2/2.5 • 大 4.5黃牌 • 大 9.5角球
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                document.getElementById('matches-container').innerHTML = `<p style="color:#f87171; text-align:center;">⚠️ 無法載入數據</p>`;
            }
        }

        function refreshData() {
            document.getElementById('update-time').textContent = "正在更新...";
            loadData();
        }

        window.onload = loadData;
        setInterval(loadData, 180000);
    </script>
</body>
</html>
